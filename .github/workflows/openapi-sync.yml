# OpenAPI sync gate (project-owned — NOT managed by cdd-kit refresh).
# Fails CI if contracts/openapi.json drifts from contracts/api/api-contract.md.
# Kept in a separate file from contract-driven-gates.yml so `cdd-kit refresh`
# (which force-refreshes the kit-shipped workflow) cannot clobber this gate.
# Fix on drift: `cdd-kit openapi export --out contracts/openapi.json` and commit.

name: openapi-sync-gate

on:
  push:
    branches: [main, master]
    paths:
      - 'contracts/api/api-contract.md'
      - 'contracts/openapi.json'
      - '.github/workflows/openapi-sync.yml'
  pull_request:
    paths:
      - 'contracts/api/api-contract.md'
      - 'contracts/openapi.json'
      - '.github/workflows/openapi-sync.yml'
  workflow_dispatch:

jobs:
  openapi-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cdd-kit
        run: npm install -g contract-driven-delivery

      - name: Verify OpenAPI export is in sync with the API contract
        run: cdd-kit openapi export --check --out contracts/openapi.json
