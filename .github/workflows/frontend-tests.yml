name: frontend-tests

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [ main ]
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"

jobs:
  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check (vue-tsc --noEmit)
        working-directory: frontend
        run: npm run type-check
        continue-on-error: true

      - name: Run vitest suite
        working-directory: frontend
        run: npm test

      - name: CSS governance check
        working-directory: frontend
        run: npm run css:check

      - name: Run legacy node --test suite
        working-directory: frontend
        run: npm run test:legacy

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright downtime-analysis spec
        working-directory: frontend
        # downtime-browser-duckdb: migrated from .spec.js to .spec.ts (e2e-resilience-engineer)
        # CI-gate note: chromium install already present above.
        run: npx playwright test tests/playwright/downtime-analysis.spec.ts || npx playwright test tests/playwright/downtime-analysis.spec.js

      - name: Run resource-history-async e2e spec (resource-history-async-e2e, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: resource-history-async-e2e (Tier 1, required)
        # Covers: TP-E2E-01 (long-span 202 poll), TP-E2E-02 (short-span 200 sync), TP-E2E-03 (useAsyncJobPolling wiring)
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/resource-history-async.spec.ts

      - name: Run production-achievement-async e2e spec (production-achievement-async-e2e, Tier 1)
        working-directory: frontend
        # Defense-in-depth cap: the spec skips fast when no dev server is present, but
        # bound the step so a future regression can never stall the job for ~25 min again.
        timeout-minutes: 8
        # ci-gates.md gate: production-achievement-async-e2e (Tier 1, required)
        # Covers: AC-1 (202+job_id, no sync Oracle call on the request thread),
        # AC-2 (poll -> spool_download_url render), AC-7 (DuckDB-WASM PA-06/PA-07
        # rollup + target-join + achievement_rate), AC-8 (threshold=0 always-activate).
        # Mirrors resource-history-async.spec.ts (same async job/poll/spool pattern, ADR-0016).
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/production-achievement-async.spec.ts

      - name: Run production-achievement critical-journey spec (playwright-critical-journeys, Tier 1)
        working-directory: frontend
        timeout-minutes: 8
        # ci-gates.md gate: playwright-critical-journeys (Tier 1, required) — gate name and
        # command already declared in contracts/ci/ci-gate-contract.md's Gate Inventory row,
        # but this file was never actually wired to an executing CI step in this workflow
        # until production-achievement-overhaul closed the gap. Ground-up rewrite for the
        # 4-mode UI (AC-8/AC-9/AC-10): filter/table/chart surface changed entirely.
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/production-achievement.spec.js

      - name: Run production-achievement resilience spec (playwright-resilience, Tier 1)
        working-directory: frontend
        timeout-minutes: 8
        # ci-gates.md gate: playwright-resilience (Tier 1, required) — gate name and directory
        # command already declared in contracts/ci/ci-gate-contract.md's Gate Inventory row,
        # but no workflow step actually ran tests/playwright/resilience/ until this change.
        # Scoped to this change's own spec file (not the whole directory) so this PR does not
        # newly surface unrelated pre-existing specs as a side effect.
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/resilience/production-achievement-resilience.spec.js

      - name: Run production-achievement data-boundary spec (playwright-data-boundary, Tier 1)
        working-directory: frontend
        timeout-minutes: 8
        # ci-gates.md gate: playwright-data-boundary (Tier 1, required) — same pre-existing
        # wiring gap as playwright-resilience above; scoped to this change's own spec file.
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/data-boundary/production-achievement-data-boundary.spec.js

      - name: Run production-achievement-monkey spec (production-achievement-monkey, Tier 1)
        working-directory: frontend
        timeout-minutes: 8
        # ci-gates.md gate: production-achievement-monkey (Tier 1, required per test-plan.md's
        # monkey-family tier assignment). First monkey/fuzz Playwright spec wired into this
        # repo's CI — no prior gate name existed for this family. Rewritten for 4-mode
        # rapid mode/station switching + settings-page CRUD adversarial input. If this proves
        # flaky, quarantine per ci-gates.md Promotion Policy rather than disabling it.
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/production-achievement-monkey.spec.ts

      - name: Run production-achievement-settings e2e spec (production-achievement-settings-e2e, Tier 1)
        working-directory: frontend
        timeout-minutes: 8
        # ci-gates.md gate: production-achievement-settings-e2e (Tier 1, required, new gate) —
        # AC-11: whitelisted-edit vs non-whitelisted-read-only across all 3 new MySQL tables.
        # New spec file — this step will fail until frontend-engineer's implementation phase
        # adds tests/playwright/production-achievement-settings.spec.ts (expected/blocking in
        # this Tier-0 contracts-ahead-of-implementation flow, not a gate defect).
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/production-achievement-settings.spec.ts

      - name: Run db-scheduling e2e spec (add-db-scheduling-page, Tier 2 informational)
        working-directory: frontend
        # ci-gates.md gate: e2e-db-scheduling (Tier 2, informational — continue-on-error: true)
        # Covers: drawer 生產輔助 appears, /db-scheduling loads, table renders (test-plan.md E2E rows)
        # Promote to Tier 1 (required) after 10 consecutive green PR runs with no flakes.
        run: npx playwright test tests/playwright/db-scheduling.spec.ts
        continue-on-error: true

      - name: Run mid-section-defect e2e spec (msd-type-package-filter, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: e2e-mid-section-defect (Tier 1, required)
        # Covers: AC-3 MultiSelect render (Type + Package), AC-4 Type-narrows-Package
        # (test-plan.md E2E rows: test_filter_bar_renders_type_multiselect,
        #  test_filter_bar_renders_package_multiselect, test_type_selection_narrows_package_options)
        # installBaseRoutes must mock **/api/mid-section-defect/container-filter-options** BEFORE
        # specific overrides per LIFO page.route() rule (ci-workflow.md).
        # npx playwright install --with-deps chromium already executed above.
        run: npx playwright test tests/playwright/mid-section-defect.spec.ts

      - name: Run uph-performance e2e spec (add-uph-performance-page, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: playwright-critical-journeys (Tier 1, required)
        # Covers: all 10 confirmed UI states in uph-performance.spec.ts (filter render,
        # trend/ranking/detail views, GDBA/GWBA family scoping, worker-unavailable 503,
        # zero-row empty state) — statically verified correct by e2e-resilience-engineer.
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/uph-performance.spec.ts

      - name: Verify test discovery
        working-directory: frontend
        run: |
          VITEST_COUNT=$(find tests -name "*.test.js" -not -path "tests/legacy/*" | wc -l)
          LEGACY_COUNT=$(find tests/legacy -name "*.test.js" | wc -l)
          echo "Vitest suite: ${VITEST_COUNT} files"
          echo "Legacy suite: ${LEGACY_COUNT} files"
          if [ "${VITEST_COUNT}" -eq 0 ] || [ "${LEGACY_COUNT}" -eq 0 ]; then
            echo "ERROR: test discovery failed"
            exit 1
          fi
