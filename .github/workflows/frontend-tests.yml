name: frontend-tests

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [ main ]
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"

jobs:
  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest suite
        working-directory: frontend
        run: npm test

      - name: Run legacy node --test suite
        working-directory: frontend
        run: npm run test:legacy

      - name: Verify test discovery
        working-directory: frontend
        run: |
          VITEST_COUNT=$(find tests -name "*.test.js" -not -path "tests/legacy/*" | wc -l)
          LEGACY_COUNT=$(find tests/legacy -name "*.test.js" | wc -l)
          echo "Vitest suite: ${VITEST_COUNT} files"
          echo "Legacy suite: ${LEGACY_COUNT} files"
          if [ "${VITEST_COUNT}" -eq 0 ] || [ "${LEGACY_COUNT}" -eq 0 ]; then
            echo "ERROR: test discovery failed"
            exit 1
          fi

  playwright-resilience:
    name: Playwright resilience specs (pre-merge gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run resilience specs
        working-directory: frontend
        run: npx playwright test tests/playwright/resilience/
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://127.0.0.1:8080' }}

      - name: Run data-boundary specs
        working-directory: frontend
        run: npx playwright test tests/playwright/data-boundary/
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://127.0.0.1:8080' }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-resilience-report
          path: frontend/playwright-report/
          retention-days: 7
