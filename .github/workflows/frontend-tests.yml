name: frontend-tests

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [ main ]
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"

jobs:
  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check (vue-tsc --noEmit)
        working-directory: frontend
        run: npm run type-check
        continue-on-error: true

      - name: Run vitest suite
        working-directory: frontend
        run: npm test

      - name: CSS governance check
        working-directory: frontend
        run: npm run css:check

      - name: Run legacy node --test suite
        working-directory: frontend
        run: npm run test:legacy

      - name: Verify test discovery
        working-directory: frontend
        run: |
          VITEST_COUNT=$(find tests -name "*.test.js" -not -path "tests/legacy/*" | wc -l)
          LEGACY_COUNT=$(find tests/legacy -name "*.test.js" | wc -l)
          echo "Vitest suite: ${VITEST_COUNT} files"
          echo "Legacy suite: ${LEGACY_COUNT} files"
          if [ "${VITEST_COUNT}" -eq 0 ] || [ "${LEGACY_COUNT}" -eq 0 ]; then
            echo "ERROR: test discovery failed"
            exit 1
          fi
