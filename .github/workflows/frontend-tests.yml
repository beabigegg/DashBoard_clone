name: frontend-tests

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [ main ]
    paths:
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/frontend-tests.yml"

jobs:
  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check (vue-tsc --noEmit)
        working-directory: frontend
        run: npm run type-check
        continue-on-error: true

      - name: Run vitest suite
        working-directory: frontend
        run: npm test

      - name: CSS governance check
        working-directory: frontend
        run: npm run css:check

      - name: Run legacy node --test suite
        working-directory: frontend
        run: npm run test:legacy

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright downtime-analysis spec
        working-directory: frontend
        # downtime-browser-duckdb: migrated from .spec.js to .spec.ts (e2e-resilience-engineer)
        # CI-gate note: chromium install already present above.
        run: npx playwright test tests/playwright/downtime-analysis.spec.ts || npx playwright test tests/playwright/downtime-analysis.spec.js

      - name: Run resource-history-async e2e spec (resource-history-async-e2e, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: resource-history-async-e2e (Tier 1, required)
        # Covers: TP-E2E-01 (long-span 202 poll), TP-E2E-02 (short-span 200 sync), TP-E2E-03 (useAsyncJobPolling wiring)
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/resource-history-async.spec.ts

      - name: Run production-achievement-async e2e spec (production-achievement-async-e2e, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: production-achievement-async-e2e (Tier 1, required)
        # Covers: AC-1 (202+job_id, no sync Oracle call on the request thread),
        # AC-2 (poll -> spool_download_url render), AC-7 (DuckDB-WASM PA-06/PA-07
        # rollup + target-join + achievement_rate), AC-8 (threshold=0 always-activate).
        # Mirrors resource-history-async.spec.ts (same async job/poll/spool pattern, ADR-0016).
        # npx playwright install --with-deps chromium already executed in "Install Playwright browsers" step above.
        run: npx playwright test tests/playwright/production-achievement-async.spec.ts

      - name: Run db-scheduling e2e spec (add-db-scheduling-page, Tier 2 informational)
        working-directory: frontend
        # ci-gates.md gate: e2e-db-scheduling (Tier 2, informational — continue-on-error: true)
        # Covers: drawer 生產輔助 appears, /db-scheduling loads, table renders (test-plan.md E2E rows)
        # Promote to Tier 1 (required) after 10 consecutive green PR runs with no flakes.
        run: npx playwright test tests/playwright/db-scheduling.spec.ts
        continue-on-error: true

      - name: Run mid-section-defect e2e spec (msd-type-package-filter, Tier 1)
        working-directory: frontend
        # ci-gates.md gate: e2e-mid-section-defect (Tier 1, required)
        # Covers: AC-3 MultiSelect render (Type + Package), AC-4 Type-narrows-Package
        # (test-plan.md E2E rows: test_filter_bar_renders_type_multiselect,
        #  test_filter_bar_renders_package_multiselect, test_type_selection_narrows_package_options)
        # installBaseRoutes must mock **/api/mid-section-defect/container-filter-options** BEFORE
        # specific overrides per LIFO page.route() rule (ci-workflow.md).
        # npx playwright install --with-deps chromium already executed above.
        run: npx playwright test tests/playwright/mid-section-defect.spec.ts

      - name: Verify test discovery
        working-directory: frontend
        run: |
          VITEST_COUNT=$(find tests -name "*.test.js" -not -path "tests/legacy/*" | wc -l)
          LEGACY_COUNT=$(find tests/legacy -name "*.test.js" | wc -l)
          echo "Vitest suite: ${VITEST_COUNT} files"
          echo "Legacy suite: ${LEGACY_COUNT} files"
          if [ "${VITEST_COUNT}" -eq 0 ] || [ "${LEGACY_COUNT}" -eq 0 ]; then
            echo "ERROR: test discovery failed"
            exit 1
          fi
