# Contract-driven gates — MES Dashboard
# See ci/gate-policy.md for tier semantics and promotion policy.

name: contract-driven-gates

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1'   # weekly Monday 18:00 UTC → stress/soak gate

jobs:
  # ──────────────────────────────────────────────────────────────
  # Tier 0 / Tier 1 — PR Required Gate (blocks merge)
  # Runs: contract validate, lint, type, unit + mock-integration,
  #       route fuzz, property-based, CSS governance, frontend unit
  # ──────────────────────────────────────────────────────────────
  contract-and-fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cdd-kit
        run: npm install -g contract-driven-delivery

      - name: Validate contracts
        run: cdd-kit validate

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mes-dashboard
          auto-activate-base: false

      - name: Lint (ruff)
        shell: bash -el {0}
        run: ruff check .

      - name: Type check (mypy)
        shell: bash -el {0}
        run: mypy src/ || true   # informational until full coverage

      - name: Unit + mock-integration tests
        shell: bash -el {0}
        run: |
          pytest \
            -m "not (e2e or integration_real or stress or load or soak or multi_worker)" \
            --ignore=tests/integration \
            --ignore=tests/stress \
            --ignore=tests/e2e \
            --ignore=tests/manual \
            -x --tb=short

      - name: Frontend install
        run: cd frontend && npm ci

      - name: Frontend unit tests (Vitest)
        run: cd frontend && npm run test

      - name: CSS governance check
        run: cd frontend && npm run css:check

  # ──────────────────────────────────────────────────────────────
  # Tier 1 — Critical E2E (blocks merge on PR)
  # Playwright: resilience + data-boundary + critical journeys
  # ──────────────────────────────────────────────────────────────
  e2e-critical:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mes-dashboard
          auto-activate-base: false

      - name: Build frontend (required for E2E)
        run: cd frontend && npm run build

      - name: Start Flask server
        shell: bash -el {0}
        run: |
          gunicorn -c gunicorn.conf.py \
            'src.mes_dashboard.app:create_app()' \
            --daemon --log-file /tmp/gunicorn.log
          sleep 5   # wait for server ready

      - name: Playwright — resilience tests
        run: cd frontend && npx playwright test tests/playwright/resilience/

      - name: Playwright — data-boundary tests
        run: cd frontend && npx playwright test tests/playwright/data-boundary/

      - name: Playwright — critical journeys
        run: cd frontend && npx playwright test tests/playwright/hold-overview.spec.js tests/playwright/reject-history.spec.js tests/playwright/query-tool.spec.js

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Tier 3 — Nightly real-infra integration (not pre-merge)
  # Requires real Oracle DB + Redis; runs on schedule or dispatch
  # ──────────────────────────────────────────────────────────────
  nightly-integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mes-dashboard
          auto-activate-base: false

      - name: Real-infra integration tests
        shell: bash -el {0}
        run: |
          pytest tests/integration/ \
            --run-integration-real \
            -m "integration_real or multi_worker" \
            -x --tb=short

  # ──────────────────────────────────────────────────────────────
  # Tier 4 — Weekly stress / soak gate
  # ──────────────────────────────────────────────────────────────
  scheduled-stress-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mes-dashboard
          auto-activate-base: false

      - name: Start Flask server for stress tests
        shell: bash -el {0}
        run: |
          gunicorn -c gunicorn.conf.py \
            'src.mes_dashboard.app:create_app()' \
            --daemon --log-file /tmp/gunicorn.log
          sleep 5

      - name: Stress + load tests
        shell: bash -el {0}
        run: |
          pytest tests/stress/ \
            -m "stress or load" \
            --tb=short

      - name: Soak workload test
        shell: bash -el {0}
        run: |
          pytest tests/integration/test_soak_workload.py \
            --run-integration-real \
            -m "soak" \
            -s --tb=short
