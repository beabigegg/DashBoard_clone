# Contract-driven gates baseline (provided by cdd-kit).
# Application/test commands MUST be customized for your stack.
# See ci/gate-policy.md for tier semantics and promotion policy.

name: contract-driven-gates

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1'

jobs:
  contract-and-fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — the "Determine changed spec directories" step below
          # diffs against the PR base / previous push commit, which the default
          # shallow (depth-1) checkout does not have locally.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install legacy response-shape validator
        run: python -m pip install jsonschema pyyaml

      - name: Install cdd-kit
        # No version pin: this project's CLAUDE.md documents "No CI version
        # pin; upgrade local cdd-kit after any spec traceability failure" as
        # deliberate policy. `@{{cdd-kit-version}}` (the kit's own generic
        # template placeholder) is an unresolved substitution and fails
        # `npm install` outright (EINVALIDTAGNAME) -- do not reintroduce it.
        run: npm install -g contract-driven-delivery

      - name: Validate contracts (explicit subset)
        # tests/contract/test_gate_wiring.py asserts this literal command
        # string is present as its own step -- keep the explicit `--contracts`
        # flag rather than the bare `cdd-kit validate` the kit's generic
        # template ships (broader coverage, but doesn't satisfy that check).
        run: cdd-kit validate --contracts

      # ── enforceInteractionDesign / enforceAcceptanceOracle / every other
      #    required cdd-kit gate check, actually invoked in CI (ci-gates.md
      #    § Workflow Changes) ──────────────────────────────────────────────
      - name: Determine changed spec directories
        id: changed
        # `shell: bash` (not the implicit default) buys `-o pipefail`, so a
        # genuine `git diff` failure fails the step instead of being masked by
        # the exit status of the last pipeline stage. That makes the no-match
        # case load-bearing: `grep -oE` exits 1 when nothing matches, which under
        # pipefail would fail every docs-only PR. `sed -n .../p` is used instead —
        # it emits nothing and exits 0 when no line matches.
        shell: bash
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              # First push of a new branch: there is no "before" commit, and on a
              # repo's very first commit `HEAD^` does not resolve either. Fall back
              # to the empty tree so the diff simply yields every path in the push.
              # `--verify --quiet` is required: a bare `git rev-parse HEAD^` echoes
              # the unresolvable argument to STDOUT before failing, so the `||`
              # fallback would concatenate "HEAD^" with the empty-tree sha.
              BASE_SHA="$(git rev-parse --verify --quiet HEAD^ || git hash-object -t tree /dev/null)"
            fi
          fi
          CHANGED="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- 'specs/changes/')"
          # Keep only change dirs that STILL EXIST at the checked-out head. A diff
          # against specs/changes/ also reports DELETIONS, so a change archived by
          # /cdd-close (moved to specs/archive/) would otherwise be gated at a path
          # that no longer exists and fail `cdd-kit gate` with "change not found" —
          # turning every close into a red CI run. An archive-only push yields zero ids.
          #
          # The trailing `; true` is load-bearing under `pipefail`+`-e`: the while
          # loop's own exit status is whatever its LAST executed command returned,
          # which for the final id in a sorted list is the `[ -d ... ]` test itself
          # when that directory was just archived (deliberately absent -> test
          # fails, exit 1) -- even though `$IDS` correctly ends up empty, that
          # trailing false leaks out as the whole `IDS="$(...)"` assignment's exit
          # code and aborts the step. `; true` pins the subshell's exit status to 0
          # so an empty, filtered-to-nothing result is never conflated with a
          # command failure. Reproduced live: an archive-only push (add-uph-
          # performance-page) failed this exact step before this fix.
          IDS="$(printf '%s\n' "$CHANGED" | sed -n 's|^specs/changes/\([^/][^/]*\)/.*|\1|p' | sort -u | while IFS= read -r id; do [ -n "$id" ] && [ -d "specs/changes/$id" ] && printf '%s\n' "$id"; done; true)"
          echo "::group::Changed spec directories"
          echo "$IDS"
          echo "::endgroup::"
          {
            echo "base_sha=$BASE_SHA"
            echo "ids<<EOF"
            echo "$IDS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Boundary Guard (PR diff)
        # `cdd-kit boundary check` does not read a CDD_BASE_SHA env var -- it
        # only accepts --base as a real CLI flag. Without --base it silently
        # checks EVERY contracted operation, not just this push's diff, which
        # is why this step previously flagged ~200 untouched endpoints on
        # every run regardless of what actually changed. Pass --base
        # explicitly so this step checks only the operations this push/PR
        # actually touched.
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          CDD_BASE_SHA: ${{ steps.changed.outputs.base_sha }}
        run: cdd-kit boundary check --base "$CDD_BASE_SHA" --verify-generated --verify-captures --json

      - name: cdd-kit gate (changed specs)
        # Zero changed spec dirs is a no-op success, not a failure (this step
        # is simply skipped). This step carries no error-suppression flag: a
        # failing gate fails the job and blocks the PR/push, by design
        # (ci-gates.md § Workflow Changes 4).
        shell: bash
        if: steps.changed.outputs.ids != ''
        run: |
          STRICT_FLAG=""
          # --strict on push to the default branch only, never on pull_request:
          # a PR is legitimately opened with tasks still pending; a merged
          # change with pending tasks is the defect (ci-gates.md § Workflow Changes 2).
          if [ "${{ github.event_name }}" = "push" ]; then
            STRICT_FLAG="--strict"
          fi
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            echo "::group::cdd-kit gate $id"
            cdd-kit gate "$id" $STRICT_FLAG
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.ids }}"

      - name: Repository-specific fast gate
        run: |
          # TODO: add your stack-specific commands here.
          # This step is intentionally left as a placeholder — cdd-kit does not assume your stack.
          # Examples of what belongs here:
          #   lint:       npx eslint src/ / ruff check . / golangci-lint run
          #   typecheck:  npx tsc --noEmit / mypy src/
          #   build:      npm run build / go build ./...
          #   unit tests: your test runner command (jest, vitest, pytest, go test, etc.)
          echo "No stack-specific fast gate configured — add lint/typecheck/build/unit-test commands above."

  e2e-critical:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Critical E2E
        run: |
          # TODO: add your critical E2E command here (Tier 1 — blocks merge).
          # This step is intentionally left as a placeholder — cdd-kit does not assume your stack.
          # Examples:
          #   Playwright:  npx playwright test --project=critical
          #   Cypress:     npx cypress run --spec "cypress/e2e/critical/**"
          #   pytest:      python -m pytest tests/e2e/critical/ -x
          echo "No critical E2E command configured — add your runner command above."

  scheduled-stress-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stress and soak tests
        run: |
          # TODO: add your stress/soak workflow here (Tier 4 — weekly long-run gate).
          # This step is intentionally left as a placeholder — cdd-kit does not assume your stack.
          # Examples:
          #   pytest soak:  python -m pytest tests/stress/ --soak-hours=4
          #   k6 load:      k6 run --vus=50 --duration=4h tests/load/scenario.js
          #   locust:       locust -f tests/stress/locustfile.py --headless -u 100 -r 10 --run-time 4h
          echo "No stress/soak command configured — add your runner command above."
