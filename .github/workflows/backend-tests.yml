name: backend-tests

on:
  schedule:
    - cron: "0 2 * * *"  # nightly at 02:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "src/mes_dashboard/services/**"
      - "src/mes_dashboard/routes/**"
      - "src/mes_dashboard/core/**"
      - "src/mes_dashboard/config/**"
      - "src/mes_dashboard/sql/**"
      - "src/mes_dashboard/workers/**"
      - "tests/**"
      - "!tests/e2e/**"
      - "!tests/stress/**"
      - "deploy/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [ main ]
    paths:
      - "src/mes_dashboard/services/**"
      - "src/mes_dashboard/routes/**"
      - "src/mes_dashboard/core/**"
      - "src/mes_dashboard/workers/**"
      - "src/mes_dashboard/sql/**"
      - "tests/**"
      - "!tests/e2e/**"
      - "!tests/stress/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/backend-tests.yml"

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify worker systemd units do not hardcode routing-flag overrides (worker-env-parity-static, Tier 1)
        # env-contract.md §Worker Feature-Flag Env-Var Parity: every `*_USE_UNIFIED_JOB` /
        # `*_USE_RQ` flag must resolve identically in gunicorn and its RQ worker via the
        # SHARED EnvironmentFile=-/opt/mes-dashboard/.env — no deploy/*.service unit may
        # hardcode its own Environment="*_USE_UNIFIED_JOB=..." / "*_USE_RQ=..." override,
        # or the two processes can silently split-brain on a stale value.
        # ci-gates.md gate: worker-env-parity-static (production-achievement-async-spool AC-5).
        run: |
          if grep -rlE 'Environment="[A-Z_]+_USE_(UNIFIED_JOB|RQ)=' deploy/*.service; then
            echo "ERROR: a deploy/*.service unit above hardcodes a routing-flag override." >&2
            echo "Routing flags (*_USE_UNIFIED_JOB / *_USE_RQ) must come only from the" >&2
            echo "shared EnvironmentFile=-/opt/mes-dashboard/.env so gunicorn and the RQ" >&2
            echo "worker always resolve the same value." >&2
            exit 1
          fi
          echo "OK: no worker unit hardcodes a routing-flag override."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Install dev dependencies
        run: |
          python -m pip install hypothesis

      - name: Run unit and integration tests
        env:
          PORTAL_SPA_ENABLED: "true"
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/stress \
            -v \
            --tb=short \
            -q

      - name: Run chunk-boundary data-boundary tests (Tier 1)
        run: |
          python -m pytest tests/stress/test_chunk_boundary.py \
            -k "TestChunkSeam or TestOrderByTieStability" \
            -v --tb=short

      - name: Run property-based tests (advisory)
        env:
          HYPOTHESIS_PROFILE: ci
        run: |
          python -m pytest -m property -v --tb=short
        continue-on-error: true  # advisory until two weeks of stable green runs

      - name: Upload Hypothesis failure examples
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-examples
          path: .hypothesis/examples/
          if-no-files-found: ignore

      - name: Verify test count is non-zero
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/stress \
            --collect-only -q | grep -E "[0-9]+ tests? collected"

  nightly-integration-real:
    name: Nightly real-subprocess integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest redis

      - name: Install redis-server
        run: sudo apt-get install -y redis-server

      - name: Install dev dependencies
        run: python -m pip install hypothesis

      - name: Run property-based tests (nightly deep run)
        env:
          HYPOTHESIS_PROFILE: nightly
        run: |
          python -m pytest -m property -v --tb=short
        continue-on-error: true

      - name: Upload Hypothesis failure examples
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-examples-nightly
          path: .hypothesis/examples/
          if-no-files-found: ignore

      - name: Run Redis timeout fallback integration tests
        run: |
          python -m pytest tests/integration/test_redis_timeout_fallback.py \
            --run-integration-real -v --tb=short
        continue-on-error: false

      - name: Run race condition integration tests
        run: |
          python -m pytest tests/integration/test_race_conditions.py \
            --run-integration-real -v --tb=short
        continue-on-error: false

  oracle-fault-injection:
    name: Oracle XE fault injection tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    # Service names, ports, and image tags mirror tests/integration/_infra_topology.py.
    # If you update that module, update these service declarations in the same commit.
    services:
      oracle-xe:                                   # ORACLE_XE_SERVICE
        image: gvenzl/oracle-xe:21-slim            # ORACLE_XE_IMAGE
        env:
          ORACLE_PASSWORD: MES_SYS_PW_1            # ORACLE_SYS_PASSWORD
          APP_USER: mes_test                        # ORACLE_TEST_USER
          APP_USER_PASSWORD: mes_test_pw            # ORACLE_TEST_PASSWORD
        ports:
          - 1521:1521                               # ORACLE_XE_PORT
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 90s

      toxiproxy:                                   # TOXIPROXY_SERVICE
        image: ghcr.io/shopify/toxiproxy:2.9.0     # TOXIPROXY_IMAGE
        ports:
          - 8474:8474                              # TOXIPROXY_ADMIN_PORT
          - 15210:15210                            # TOXIPROXY_ORACLE_LISTEN_PORT

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest oracledb

      - name: Wait for Oracle XE readiness
        # GHA does not block steps on service healthcheck completion, so we
        # poll here explicitly before handing off to pytest.  This step fails
        # fast (exits 1) if Oracle is not reachable within 240s, giving a
        # clear signal without relying on the fixture's internal timeout.
        timeout-minutes: 6
        run: |
          python - <<'EOF'
          import sys, time, oracledb
          deadline = time.monotonic() + 240
          last_exc = None
          while time.monotonic() < deadline:
              try:
                  c = oracledb.connect(
                      user="mes_test", password="mes_test_pw",
                      dsn="127.0.0.1:1521/XEPDB1",
                  )
                  c.close()
                  print("Oracle XE is ready")
                  sys.exit(0)
              except Exception as exc:
                  last_exc = exc
                  print(f"Waiting for Oracle XE... ({exc})", flush=True)
                  time.sleep(5)
          print(f"Oracle XE did not become ready within 240s. Last error: {last_exc}")
          sys.exit(1)
          EOF

      - name: Run Oracle fault injection smoke tests
        run: |
          python -m pytest tests/integration/test_real_oracle_fault_injection.py \
            --run-integration-real -v --tb=short
        continue-on-error: false

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-fault-injection-logs
          path: /tmp/pytest-*/
          if-no-files-found: ignore

  multi-worker-concurrency:
    name: Multi-worker RQ concurrency tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest redis rq

      - name: Install redis-server
        run: sudo apt-get install -y redis-server

      - name: Start redis-server
        run: redis-server --daemonize yes

      - name: Run multi-worker concurrency tests
        # Target the specific file instead of `-m multi_worker` so pytest does
        # not collect tests/e2e (needs playwright) or tests/property (needs
        # hypothesis) during marker filtering — those are out of scope here.
        run: |
          python -m pytest tests/integration/test_multi_worker_concurrency.py \
              --run-integration-real -v --tb=short
        continue-on-error: false

      - name: Upload worker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: multi-worker-logs
          path: /tmp/pytest-*/
          if-no-files-found: ignore

  real-infra-smoke:
    # ================================================================
    # Stage 4a — INFORMATIONAL ONLY (non-required, non-blocking).
    #
    # This job runs on every pull_request but is NOT in branch
    # protection's required status checks.  Reviewers see failures
    # visibly but merges are not blocked.
    #
    # Promotion to Stage 4b (required) is gated on stability
    # thresholds documented in docs/ci_real_infra_gate_policy.md:
    #   - 20-day × 60-run window pass rate = 100%
    #   - per-file p95 wall time < 180s
    #
    # The job name "real-infra-smoke" is deliberately final — when
    # Stage 4b lands, only branch protection changes; this workflow
    # stays the same.
    #
    # Spec: openspec/changes/harden-real-infra-test-coverage/specs/
    #       multi-worker-concurrency-test-coverage/spec.md
    #       "Pre-merge gate upgrade SHALL follow a two-stage rollout"
    # ================================================================
    name: real-infra-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest redis rq

      - name: Install redis-server
        run: sudo apt-get install -y redis-server

      - name: Start redis-server
        run: redis-server --daemonize yes

      - name: Run real-infra smoke (3 files)
        # Scope locked to the three files in the delta spec:
        #   "Pre-merge `real-infra-smoke` job SHALL run a bounded,
        #    dedicated subset"
        run: |
          python -m pytest \
              tests/integration/test_multi_worker_concurrency.py \
              tests/integration/test_redis_chaos.py \
              tests/integration/test_real_multi_worker.py \
              --run-integration-real -v --tb=short
        continue-on-error: false

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-infra-smoke-logs
          path: /tmp/pytest-*/
          if-no-files-found: ignore
