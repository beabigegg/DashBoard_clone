# Docker PRD 部署
# 使用：docker compose -f docker-compose.prd.yml up -d
# 環境設定：.env.prd（Docker PRD 完整設定，含機密，不進 git）
#
# 硬體需求：4+ cores, 12-16GB RAM（建議 16GB）, SSD 50GB+
# 容量：50 人使用 / 10-12 人同時在線

services:
  mes-dashboard-app:
    build: .
    container_name: mes-dashboard-app
    restart: unless-stopped
    env_file:
      - .env.prd
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
      - app_spool:/app/tmp/query_spool
    depends_on:
      mes-dashboard-redis:
        condition: service_healthy
    networks:
      - mes-dashboard-net

  mes-dashboard-redis:
    image: redis:7-alpine
    container_name: mes-dashboard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 768mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mes-dashboard-net

volumes:
  redis_data:
  app_logs:
  app_spool:

networks:
  mes-dashboard-net:
    driver: bridge
