summary: >
  Implemented IP-1..IP-7 exactly per implementation-plan.md. Moved
  TargetPermissionsPanel.vue admin-pages -> admin-dashboard with all rendered
  classes renamed to panel-exclusive .pa-perm-* names (DECISION-3, avoiding the
  live .theme-admin-dashboard .status-badge / bare <table> collision used by
  RecentSessionsTable.vue). Created PermissionsTab.vue under admin-dashboard/tabs/
  following the CacheTab.vue/LogsTab.vue tab convention (defineExpose({refresh}),
  onMounted -> refresh(), admin-tab__last-updated, ErrorBanner, SectionCard);
  ported putJson/getCsrfToken/loadPermissions/toggle/grantNew from
  admin-pages/App.vue verbatim (duplicated per Known Risks, admin-pages keeps its
  own copy for handleUpdatePage). Registered the `permissions` tab (label
  目標值權限) after `logs` in admin-dashboard/App.vue. Appended
  .theme-admin-dashboard-scoped .pa-perm-* rules to admin-dashboard/style.css
  (zero bare table/.status-badge redefinition). Removed the permission block +
  its state/functions/import from admin-pages/App.vue (kept putJson/getCsrfToken
  for handleUpdatePage) and the two dead .pa-perm-add-row/.pa-perm-add-input
  rules from admin-pages/style.css (shared table/badge rules kept for
  PagesManagementPanel). IP-8 (contract prose bumps: api 1.38.1, css-contract
  1.13.0, css-inventory 1.2.10) was already applied by contract-reviewer/main
  before this run — confirmed byte-consistent, no further edit needed.

  Fast-follow (this run): per ui-ux-reviewer non-blocking finding,
  PermissionsTab.vue had no loading state, so TargetPermissionsPanel.vue's
  "尚無授權名單" empty-state rendered during the initial in-flight GET
  (permissions.value starts as []), falsely claiming no permissions were
  granted before the first fetch resolved. Added a `loading` ref (true
  before the initial refresh(), set false in a `finally` so it clears on
  both success and error paths) and gated the panel render in the template
  with `BlockLoadingState` (v-if="loading") / `TargetPermissionsPanel`
  (v-else), following the UsageTab.vue BlockLoadingState convention
  (already imported in this app) rather than CacheTab.vue's
  v-if="perfDetail" pattern, since permissions is an array (empty is a
  valid post-load state, not an absent object). ErrorBanner/refresh()/
  defineExpose behavior left untouched. Added a unit test asserting the
  loading indicator (not the false empty-state) renders while the initial
  fetch is pending, and resolves to the real empty-state after. The extra
  `finally` hop added one more microtask before the DOM settles, so
  pre-existing double-$nextTick() waits in this test file became flaky;
  replaced them with @vue/test-utils' flushPromises() (verified against
  original suite: the apparent failures were solely the extra async hop,
  not stale pre-existing breakage — confirmed by reverting the source-side
  loading gate as a control and seeing only the new-loading-test
  assertions fail).
