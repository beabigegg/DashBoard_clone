bug-fix:
  schema-version: 0.1.0
  symptom: "yield-alert-center KPI cards (移轉量/報廢量) do not reconcile with the CSV detail export under the same filters, and the exported CSV contains raw float-noise values such as 4011.9999999999995 in the transaction_qty/scrap_qty columns."
  expected_behavior: "KPI 移轉量/報廢量 reflect the alert-candidate totals under the current filters (same scope as _query_alerts(): SCRAP_QTY<>0 plus the risk_threshold/min_scrap_qty exclusion, with transaction_qty deduped over tx_extra_cols so multi-reason-code groups are not double-counted), reconciling with the CSV detail sums; CSV numeric fields are cleanly rounded whole-pcs integers."
  actual_behavior: "_query_summary() sums the whole dept/proc-filtered scope with no SCRAP_QTY<>0 filter and no risk_threshold/min_scrap_qty exclusion, so it includes rows _query_alerts() would drop; a naive SUM(transaction_qty) over multi-reason-code alert rows would additionally double-count transaction_qty for groups with 2+ REASON_CODE values; _buildAlertsCSV() writes String(toPcs(transaction_qty))/String(toPcs(scrap_qty)) with no rounding, so DuckDB DOUBLE float residue is amplified by the *1000 K-PCS-to-pcs conversion into values like 4011.9999999999995."
  observed_surface: "yield-alert-center KPI summary cards and the '匯出全部 CSV' (export all CSV) button's downloaded file"
  reproduction:
    status: test-reproduced
    command: "python -m pytest tests/test_yield_alert_sql_runtime.py -k TestQuerySummaryAlertScopeParity -v"
    failing_before_fix: true
    summary: "specs/changes/yield-alert-kpi-csv-parity/test-runs/20260701-142323/summary.json"
  hypotheses:
    - { id: H1, candidate: "src/mes_dashboard/services/yield_alert_sql_runtime.py::_query_summary", reason: "change-classification.md Bug Evidence hypothesis 1: KPI scope divergence from alert-candidate scope", result: confirmed }
    - { id: H2, candidate: "src/mes_dashboard/services/yield_alert_sql_runtime.py::_query_alerts (alert_groups/tx_lookup join)", reason: "change-classification.md Bug Evidence hypothesis 2: naive SUM over alerts_filtered.transaction_qty double-counts multi-reason-code groups", result: confirmed }
    - { id: H3, candidate: "frontend/src/yield-alert-center/App.vue::_buildAlertsCSV", reason: "change-classification.md Bug Evidence hypothesis 3: missing rounding in _buildAlertsCSV()", result: confirmed }
  root_cause:
    pointer: "src/mes_dashboard/services/yield_alert_sql_runtime.py:196-240"
    summary: "_query_summary() aggregates SUM(TRANSACTION_QTY)/SUM(SCRAP_QTY) over dept_proc_where + reason_excl_sql only -- it has no risk_threshold/min_scrap_qty parameters and no SCRAP_QTY<>0 predicate, so it includes rows _query_alerts() (which does apply that full alert-candidate predicate, line 516-518 and 602-611) would exclude. Additionally, since alert_groups (569-577) groups by REASON_CODE while tx_lookup (564-567) does not, any future naive SUM(transaction_qty) directly over alerts_filtered-shaped rows (rather than a DISTINCT-deduped sum keyed on tx_extra_cols) will double-count groups with multiple reason codes -- proven at src/mes_dashboard/services/yield_alert_sql_runtime.py:534-581."
