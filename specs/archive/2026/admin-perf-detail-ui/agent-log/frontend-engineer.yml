mock-strategy-note: >
  vi.mock paths in the test file are relative to the TEST file location
  (src/admin-dashboard/tabs/__tests__/), requiring ../../../ (3 levels up) to
  reach src/admin-shared/ and src/shared-ui/. Initially used ../../  (2 levels),
  which silently fell back to the real module. Fixed using vi.hoisted to create
  mockStore before mock factory, and async import('vue') inside the factory to
  avoid require() TS error (TS2591).

