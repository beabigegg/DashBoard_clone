# ── useAutoRefresh decision (AC-2) ──────────────────────────────────────────────
useAutoRefresh_decision: renamed-and-typed-in-place
useAutoRefresh_reason: >
  hold-history/useAutoRefresh.js exposes a divergent API from shared-composables/useAutoRefresh.ts.
  Local API: { intervalMs, fetchFn } → { start, stop, lastRefreshAt, isStale, missCount }.
  Shared API: { onRefresh, intervalMs, autoStart, refreshOnVisible } → { startAutoRefresh, stopAutoRefresh, ... }.
  App.vue uses .start(), .stop(), .isStale.value, .lastRefreshAt.value — all local-API-specific.
  Decision: rename to useAutoRefresh.ts and type in place. Delete old .js.
  The shared composable wraps wip-shared/composables/useAutoRefresh.ts which has a third,
  different API designed for wip-feature patterns with abort controllers and jitter.

