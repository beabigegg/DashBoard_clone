  GAP 1 (missing property test): created
  tests/property/test_production_achievement_aggregate_invariant.py from
  scratch (confirmed via `git log --all` it never existed, matching the
  task's claim). Read tests/property/README.md + an existing file
  (test_hold_history_duration_invariants.py) first for house style
  (`@pytest.mark.property` + `@given`, local `@st.composite` strategies are
  an established convention, not just tests/property/strategies.py entries).
  Generalizes the single hand-picked 950/1000-vs-5/10 D3 fixture from
  useProductionAchievementDuckDB.test.ts across generated cases using EXACT
  Fraction arithmetic, not float tolerance. Derived and empirically verified
  (via a throwaway python3 -c snippet before encoding it as an assertion) a
  closed-form identity for 2 groups: aggregate-then-divide minus
  mean-of-percentages = (r1-r2)(p1-p2) / (2(p1+p2)) -- so the two formulas
  coincide EXACTLY iff ratios or plan magnitudes are shared, and differ in
  EVERY other case; this is airtight, not probabilistic. Used this to write
  an `iff` test with zero flake risk, plus a second test using a
  `@st.composite` strategy that GUARANTEES (by construction/deterministic
  perturbation, never by `assume()`-discarding) that generated examples
  satisfy "both ratio and plan differ" -- avoiding any FilteredTooMuch
  health-check risk. Deliberately did NOT encode the commonly-repeated
  shorthand "differs whenever plan magnitudes differ" as the tested
  invariant -- it is false in general (2 groups with different plans but the
  SAME ratio still coincide); documented this precision explicitly in the
  module docstring so a future reader understands why the precondition is
  "ratio AND plan" not just "plan".


