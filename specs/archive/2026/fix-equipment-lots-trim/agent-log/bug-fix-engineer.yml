bug-fix:
  schema-version: 0.1.0
  symptom: "query-tool 批次追蹤生產設備 tab: equipment resolution succeeds (\"找到 25 台設備\") but the 生產紀錄 (production-records) sub-tab renders correct columns with zero rows, for a 21-work-order / 6-workcenter-group query."
  expected_behavior: "Production records for the resolved equipment/containers render as non-empty rows in the 生產紀錄 sub-tab."
  actual_behavior: "Every row is filtered out client-side; the sub-tab shows zero rows despite equipment resolving correctly and the API returning matching columns."
  observed_surface: "query-tool Equipment Lot Tracking (批次追蹤生產設備) production-records (生產紀錄) sub-tab"
  reproduction:
    status: reproduced
    command: "Controlled-input reproduction (no live Oracle/staging access in this session): read src/mes_dashboard/sql/query_tool/equipment_lots.sql pre-fix (bare c.CONTAINERNAME, no TRIM, vs. adjacent TRIM(c.PRODUCTLINENAME)) alongside frontend/src/query-tool/composables/useLotEquipmentQuery.ts's queryLots()/queryRejects() exact-match Set.has() filter, and ran tests/test_query_tool_service.py::TestGetEquipmentLots::test_equipment_lots_containername_trimmed_char_padded (pins Oracle CHAR blank-padding behavior for DW_MES_CONTAINER.CONTAINERNAME). The trace deterministically reproduces the reported symptom: an Oracle CHAR-padded CONTAINERNAME value compared with exact-match Set.has() against already-trimmed lot names fails every row, while the equipment-resolution step's in-Oracle comparison is unaffected by the same padding -- exactly matching \"25 equipment resolved, 0 production-record rows\"."
  hypotheses:
    - { id: H1, candidate: "src/mes_dashboard/sql/query_tool/equipment_lots.sql::ranked_lots CTE (c.CONTAINERNAME column)", reason: "9 other SQL files in the codebase already TRIM this same Oracle CHAR-padded DW_MES_CONTAINER.CONTAINERNAME column, and the adjacent line already TRIMs the sibling PRODUCTLINENAME column -- a strong sibling-inconsistency signal", result: confirmed }
    - { id: H2, candidate: "frontend/src/query-tool/composables/useLotEquipmentQuery.ts::queryLots()/queryRejects() exact-match Set.has() filter", reason: "client-side filter compares an untrimmed CONTAINERNAME against already-trimmed resolvedLotNames; confirmed as a compounding factor (defense-in-depth fix applied) rather than the sole root cause, since the SQL-level TRIM alone resolves the symptom", result: confirmed }
    - { id: H3, candidate: "backend pagination clamp (QUERY_TOOL_DETAIL_MAX_PER_PAGE=500) silently dropping rows before the frontend's per_page=9999 request", reason: "a separate, previously-known limit that could independently cause missing rows for large result sets", result: unconfirmed }
    - { id: H4, candidate: "frontend/src/query-tool/composables/useLotEquipmentQuery.ts::queryJobs() CONTAINERNAMES substring filter", reason: "structurally similar filter pattern in the same composable; checked for the same CHAR-padding defect", result: rejected }
  root_cause:
    pointer: "src/mes_dashboard/sql/query_tool/equipment_lots.sql:32"
    summary: "equipment_lots.sql selected c.CONTAINERNAME from the Oracle CHAR-padded DWH.DW_MES_CONTAINER table without TRIM(), unlike the adjacent TRIM(c.PRODUCTLINENAME) column; the resulting blank-padded value then failed the exact-match Set.has() comparison in useLotEquipmentQuery.ts's queryLots()/queryRejects() against already-trimmed resolved lot names, causing every production-record row to be filtered out even though the underlying equipment/container match was correct."
  fix:
    files_changed:
      - src/mes_dashboard/sql/query_tool/equipment_lots.sql
      - src/mes_dashboard/services/query_tool_service.py
      - src/mes_dashboard/routes/query_tool_routes.py
      - frontend/src/query-tool/composables/useLotEquipmentQuery.ts
      - tests/test_query_tool_service.py
      - tests/test_query_tool_routes.py
      - tests/integration/test_query_tool_rq_async.py
      - frontend/tests/query-tool/useLotEquipmentQuery.test.js
      - contracts/api/api-contract.md
      - contracts/CHANGELOG.md
      - contracts/openapi.json
      - contracts/api/openapi.json
    summary: "Added TRIM(c.CONTAINERNAME) AS CONTAINERNAME in equipment_lots.sql (matching the sibling TRIM(c.PRODUCTLINENAME) treatment); added a defensive .trim() before .toUpperCase() in useLotEquipmentQuery.ts's queryLots()/queryRejects() exact-match filters; added an optional server-side container_names: List[str] push-down filter to get_equipment_lots() (UPPER(TRIM(c.CONTAINERNAME)) IN (...), built on the same QueryBuilder instance as the equipment filter to avoid bind-param collision), wired through both the sync route and the async RQ job path for parity, applied before the QUERY_TOOL_DETAIL_MAX_PER_PAGE pagination clamp; added regression tests on both stacks proving CHAR-padded/case-variant CONTAINERNAME values match correctly after the fix."
  regression:
    status: passed
    command: >-
      python -m pytest tests/integration/test_query_tool_rq_async.py tests/test_query_tool_routes.py
      tests/test_query_tool_service.py -q --maxfail=1 --tb=short -ra
    summary: specs/changes/fix-equipment-lots-trim/test-runs/20260709-093120/summary.json
  residual_risk: none
