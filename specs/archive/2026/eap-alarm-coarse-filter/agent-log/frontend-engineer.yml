  ("全部篩選後機台") implied "all machines in this family" would be applied.

  IP-12 fix #1 (frontend/src/eap-alarm/FilterBar.vue::handleSubmit, ~L91-113):
    - When `cascade.families.length > 0 && (props.filters.machines?.length ?? 0) === 0`,
      expand the emitted `machines` array to every name in the already-computed
      `machineOptions.value` (the family-filtered machine pool) before emitting
      `update:filters`/`submit`.
    - When specific machines are already selected, or no family is selected,
      `machines` is forwarded unchanged (existing behavior preserved).
    - `cascade.families` remains local-only; never sent to the backend.

  IP-12 fix #2 (coordinator-directed, same round — frontend/src/eap-alarm/FilterBar.vue::canSubmit, ~L135-147):
