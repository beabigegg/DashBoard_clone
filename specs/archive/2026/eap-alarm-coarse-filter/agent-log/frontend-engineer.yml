      template/prop change required" and scoped only `handleSubmit`. The
      coordinator correctly flagged this as in-scope: without this fix, the
      exact D-8/AC-10 scenario (型號-only, no 機台/LOT/product-dims) is
      unreachable through the UI because the submit button stays disabled,
      making fix #1 dead code from the user's perspective.
    - Added `cascade.families.length > 0` as a fourth satisfied axis in
      `canSubmit`'s at-least-one-of-three OR-chain, alongside
      `machines.length > 0`, `hasLotIds`, `pj_types/product_lines/pj_bops`.
      Family-only selection now enables the submit button on its own.
    - No template/prop/CSS change — both fixes are pure computed/handler
      logic; the acceptance criterion this addresses ("型號有選、機台未選 →
      應該回傳屬於此機型的所有機台") is now reachable end-to-end via the UI.
    - Previously-flagged "remaining risk" (canSubmit not counting family-only
