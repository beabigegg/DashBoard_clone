    action: modify
    notes: |
      Added 2 tests + a shared cache-worker subprocess script
      (_CACHE_WORKER_SCRIPT, _spawn_cache_workers helper):
        - test_container_filter_cache_lock_under_4_workers (AC-6, PHF-05):
          spawns 4 subprocesses sharing a Redis instance and a single test
          lock-path; each runs cache_mod._load(force=True) after a Redis
          barrier release. Patches read_sql_df to increment a Redis counter
          and sleep 2 s, so the loser workers must enter the lock-wait branch.
          Asserts exactly 1 Oracle hit and all 4 workers report identical
          indices payload.
        - test_lock_holder_crash_releases_lock: pre-creates the lock sentinel
          (simulating a crashed prior holder), spawns 1 worker with the
          lock-poll constants lowered to 1 s × 2 iterations for fast test
          execution, asserts the worker (a) does not hang past 30 s, (b)
          falls through to direct Oracle in degraded mode (Oracle hit count
          >= 1), (c) returns a successful payload. Documents the explicit
          design choice: D4 has no mtime reaper — fall-through is the
          contracted behaviour, not stale-file deletion.
      Imports added: subprocess, sys.
