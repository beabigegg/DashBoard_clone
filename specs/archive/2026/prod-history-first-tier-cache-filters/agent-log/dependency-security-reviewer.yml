# ────────────────────────────────────────────────────────────────────────────
# Scope
# ────────────────────────────────────────────────────────────────────────────
# Audit of the new wildcard SQL input path (PHF-02 / PHF-03 / PHF-06) plus the
# three new MultiSelect non-wildcard params (pj_packages / pj_bops /
# pj_functions). Verdict applies only to this change's diff; pre-existing
