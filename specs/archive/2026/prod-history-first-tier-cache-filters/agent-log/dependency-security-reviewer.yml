# ────────────────────────────────────────────────────────────────────────────
# Recommendations (low-priority, non-blocking)
# ────────────────────────────────────────────────────────────────────────────
recommendations:
  - id: R1
    title: "Add per-token max length cap (e.g., 128 chars)"
    location: src/mes_dashboard/core/request_validation.py  # after step 6, before escape
    rationale: |
      Today the 100-pattern cap and the 256 KB body cap bound aggregate
      payload, but a single 100 KB-long token would still build a 100 KB
      LIKE pattern. MES identifier lengths are < 30 chars in practice;
      a 128-char cap would not impact legitimate users and would cap
      worst-case Oracle pattern-match cost. Suggested constant:
      WILDCARD_MAX_TOKEN_LENGTH = 128.
    severity: low

  - id: R2
    title: "Optional Unicode normalization for textarea inputs"
    location: src/mes_dashboard/core/request_validation.py  # parse_wildcard_tokens step 2
    rationale: |
      Applying unicodedata.normalize('NFKC', text) before split would
      collapse full-width digits, strip ZWSP-like invisibles, and reduce
      "looks-the-same-but-doesn't-match" user confusion. Not a security
      requirement — purely UX. If adopted, document in PHF-02.
    severity: low

  - id: R3
    title: "Migrate material_trace_service to shared build_wildcard_clause"
    location: src/mes_dashboard/services/material_trace_service.py  # _add_exact_or_pattern_condition
    rationale: |
      The shared emitter at sql/wildcards.py was lifted out specifically
      to consolidate audit chokepoints (U2 decision). material_trace still
      uses the older inline pattern without PHF-06 meta-char rejection.
      Already tracked in backend-engineer caveat
      MATERIAL-TRACE-MIGRATION-FOLLOWUP — no action needed for this
      change, but worth carrying forward as a security follow-up.
    severity: low

# ────────────────────────────────────────────────────────────────────────────
# Design U3 closeout
# ────────────────────────────────────────────────────────────────────────────
u3-closeout:
  question: |
    "Does the meta-char regex cover Oracle q'[...]' and ||?"
  answer: |
    Partial-but-sufficient. The regex catches q'[...]' (via the leading
    single quote) and /*...*/ (both delimiters). It does NOT catch || or
    DBMS_*/UTL_*/EXECUTE IMMEDIATE identifier-shaped sequences — and it
    does not need to. User input flows ONLY through oracledb named bind
    parameters into LIKE / IN string-compare contexts. Bind values cannot
    escape into the SQL parser: || in a bound string is a literal
    concatenation of two characters, not an operator. The regex is
    defense-in-depth; the bind protocol is the actual security boundary.

