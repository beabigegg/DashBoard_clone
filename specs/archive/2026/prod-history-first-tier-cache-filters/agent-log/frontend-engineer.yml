unresolved:
  - id: i18n-locale-files
    note: |
      CLAUDE.md Hard Rule #5 requires locale-file parity for new user-visible
      strings *if the project supports multi-language*. Production-history has
      no `locales/` directory and no useI18n() usage anywhere in its tree
      (verified via grep) — all existing strings are inline Chinese literals.
      Followed the same pattern for the new labels / hints / placeholders.
      If a project-wide i18n adoption lands later, this surface must be
      backfilled alongside hold-history, reject-history, etc.
  - id: e2e-playwright-specs
    note: |
      Per work-packet instructions, Playwright spec creation
      (production-history-cross-filter.spec.ts,
      production-history-wildcard-paste.spec.ts,
      production-history-multi-line-input.spec.ts) is deferred to
      e2e-resilience-engineer.
  - id: ts-resolver-loader-extension
    note: |
      Extended ts-resolver-loader.mjs to resolve extensionless relative
      imports (`from '../../core/api'`). Pre-existing loader only handled
      `.js → .ts` swaps. The new branch probes .ts / .js / index.ts /
      index.js in that order. Did not touch the existing .js→.ts path —
      backward compatible. This unblocks the legacy node --test runner for
      composables that follow the CLAUDE.md TS migration convention of
      dropping extensions; will benefit future TS migrations too.

