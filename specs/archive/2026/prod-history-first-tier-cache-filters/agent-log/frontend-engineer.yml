implementation-summary: |
  D6: removed (not hidden) MFGORDERNAME / CONTAINERNAME / Package / BOP from
  the second-tier panel by stripping those keys from SupplementaryFilter /
  SupplementaryOptions interfaces; second-tier now carries only WorkCenter +
  Equipment (still spool-derived). PHF-01 cross-filter implemented in a new
  useFirstTierFilters composable: GET /api/production-history/filter-options
  with a 200 ms debounce, stale-response guard via incrementing token, and
  automatic pruning of selections that disappear from the narrowed option
  set (fail-open picker). Multi-line wildcard parser parseWildcardInput
  splits on newline/comma/whitespace, trims, dedups, is idempotent (AC-5),
  and crucially does NOT translate '*' to '%' — the backend re-validates and
  binds per PHF-02 (defense-in-depth). Wildcard fields (mfg_orders / lot_ids
  / wafer_lots) added to QueryParams alongside the cached cross-filter
  fields (pj_packages / pj_bops / pj_functions); all six are optional and
  omitted when empty (back-compat AC-3).
