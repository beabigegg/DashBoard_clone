fixes:
  - id: fix-1-error-banner
    addresses: UI-UX REC-01 (severity high) — id "7-empty-state-for-filter-options-api-failure"
    description: |
      Added a visible error banner above the first-tier rows in
      production-history/App.vue that surfaces firstTier.error.value when
      the GET /api/production-history/filter-options request fails. Uses a
      dedicated `.ph-first-tier__error` class with red bg/border, role="alert",
      aria-live="polite", and data-testid="ph-first-tier-error". Copy guides
      the user to retry or fall back to manual wildcard input.
    files:
      - frontend/src/production-history/App.vue
      - frontend/src/production-history/style.css

  - id: fix-2-pruned-notice
    addresses: UI-UX REC-02 (severity medium) — id "4-fail-open-pruning-ux"
    description: |
      Added `prunedFields: CachedFilterField[]` ref + `clearPrunedFields()`
      action to useFirstTierFilters.ts. `_pruneSelection()` now records which
      fields had selections dropped on the latest fetch. App.vue derives a
      transient notice "篩選自動調整：Type、Package、…" that auto-clears after
      3 s OR immediately when the user manually changes a selection (handled
      by setSelection() which resets prunedFields). The notice has role="status",
      aria-live="polite", and data-testid="ph-first-tier-pruned-notice".
    files:
      - frontend/src/production-history/composables/useFirstTierFilters.ts
      - frontend/src/production-history/App.vue
      - frontend/src/production-history/style.css

  - id: fix-3-second-tier-heading
    addresses: UI-UX REC-03 (severity medium) — id "5-second-tier-minimization"; VR-07
    description: |
      Added "查詢後細部篩選 (Spool)" heading (`<p class="ph-second-tier__heading">`)
      above the supplementary-filters panel and reduced the panel grid from
      lg:grid-cols-4 → lg:grid-cols-2 so the two remaining filters (WorkCenter,
      Equipment) fill the row without empty slots. Heading style mirrors
      `.ui-filter-label` weight with a top border-separator from the first-tier
      block.
    files:
      - frontend/src/production-history/App.vue
      - frontend/src/production-history/style.css

  - id: fix-4-css-design-tokens
    addresses: VR-01 must-fix; UI-UX id "10-design-token-compliance"
    description: |
      Replaced raw values in `.ph-first-tier__wildcard-input`:
        min-height: 64px        → @apply min-h-16
        font-family: ui-monospace,… → @apply font-mono
        width: 100% + font-size: 12px → @apply w-full text-xs
      The class is now a single `@apply` line, fully tailwind-utility based.
      `font-mono` is Tailwind's built-in stack, no tailwind.config.js change
      needed. css:check still reports 0 errors, no new warnings.
    files:
      - frontend/src/production-history/style.css

  - id: fix-5-textarea-rows
    addresses: VR-03 should-fix
    description: |
      Reduced rows="3" → rows="2" on all three wildcard textareas to balance
      visual weight against the four 36–40 px MultiSelect triggers in the
      adjacent row.
    files:
      - frontend/src/production-history/App.vue

  - id: fix-6-playwright-testids
    addresses: VR-10 stable selector proposal
    description: |
      Added 9 data-testid attributes for the e2e-resilience-engineer follow-up:
        ph-first-tier-type / -package / -bop / -function (on each MultiSelect root)
        ph-first-tier-mfg-orders / -lot-ids / -wafer-lots (on each textarea)
        ph-first-tier-error (on the new error banner)
        ph-first-tier-pruned-notice (on the new pruning notice)
      MultiSelect.vue uses default inheritAttrs=true so data-testid passes
      through to its root `<div class="multi-select">` automatically — no
      shared-ui change required.
    files:
      - frontend/src/production-history/App.vue

  - id: fix-7-a11y-label-and-alert
    addresses: UI-UX REC-04 (severity medium) — id "9-accessibility" sub-items (b) + (c)
    description: |
      Added id="ph-mfg-orders" / "ph-lot-ids" / "ph-wafer-lots" on the three
      textareas and matching `for=` on their labels for explicit label-control
      association. Added role="alert" + aria-live="polite" to the inline form
      validation `<span class="ph-app__form-error">` so screen readers announce
      formError messages. The new error banner and pruning notice both carry
      role + aria-live too. Sub-items (a) MultiSelect keyboard nav and (d)
      aria-expanded on multi-select-trigger are pre-existing shared-ui gaps —
      out of scope per the work packet.
    files:
      - frontend/src/production-history/App.vue

