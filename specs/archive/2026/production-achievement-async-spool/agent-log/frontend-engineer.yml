notes: >
  IP-6/IP-7 implemented, then three coordinator-relayed UI/UX + monkey-review
  follow-up fixes applied to useProductionAchievement.ts + App.vue.

  Original implementation: useProductionAchievementDuckDB.ts mirrors
  useResourceHistoryDuckDB.ts's activate/computeView/deactivate lifecycle;
  activate() calls checkLocalComputeEligibility with threshold=0 (Q1,
  always-activate) and throws an explicit unsupported-browser error with no
  hidden server fallback when WASM is unavailable. computeView() SQL: INNER
  JOIN spool.SPECNAME to an in-memory VALUES-table spec_workcenter_map via
  UPPER(TRIM(SPECNAME)) on both sides (matches backend
  str(specname).strip().upper()), GROUP BY output_date/shift_code/
  workcenter_group SUM(actual_output_qty) (PA-06), then LEFT JOIN a second
  VALUES-table targets_map on (shift_code, workcenter_group) with a CASE WHEN
  guard producing null on missing/zero target and 0.0 on
  zero-actual+non-null-target (PA-07, never Infinity).

  FIX 1 (UX-1, contradictory error+empty messaging): App.vue's results block
  now gates on `showResults = hasQueried && !error` (was just `hasQueried`) --
  on a failed query the SummaryCardGroup/AchievementChart/detail DataTable no
  longer render alongside ErrorBanner; a genuine zero-row success still
  renders the results section as-is. Added App.test.ts (new file, real
  App.vue mount via @vue/test-utils shallow mode) asserting presence/absence
  of the SummaryCardGroup/AchievementChart/DataTable components by module
  reference across the 503-error / success / empty-success cases; also
  strengthened the existing 503 unit test in useProductionAchievement.test.ts
  to assert the hasQueried=true+error!=='' precondition explicitly.

  FIX 2 (UX-2, tail-end flicker + lost cancel): _pollForCompletion() no
  longer resets asyncJobProgress in its success path -- it relabels the
  card ("正在載入結果…", pct=100, status='finished') and leaves
  `active=true` through the tail re-GET; runQuery()'s `finally` is now the
  ONLY place that resets it, after _activateAndRender() (parquet fetch +
  DuckDB activate + computeView) has also settled, success or failure. Added
  a unit test that snapshots asyncJobProgress state via a mockImplementationOnce
  hook on the final computeView sendQuery call, proving active/status/progress/
  pct are still in the "loading result" state at that point, not reset back to
  a blank full-page overlay.

  FIX 3 (monkey scenario 3, mid-poll stale-filter correctness bug): runQuery()
  now snapshots {start_date, end_date, shift_code, workcenter_group} into a
  local QuerySnapshot once at enqueue time; _fetchReportOnce/_pollForCompletion/
  _activateAndRender all thread that snapshot through instead of reading live
  `filters` -- a user editing the date range mid-poll no longer causes the
  tail re-GET to target a different (not-yet-spooled) range. Additionally,
  the tail re-GET can itself come back 202 again (e.g. spool TTL/eviction
  race); _pollForCompletion now recurses to re-poll the new job against the
  SAME snapshot (bounded by MAX_TAIL_REENQUEUE_ATTEMPTS=2, after which it
  surfaces a clean error instead of feeding an undefined spool_download_url
  into activate() or looping forever). Three new unit tests: live-filter
  mutation during poll does not leak into the tail-GET URL (asserted via the
  captured fetch call args) while the user's live edit is still preserved for
  their next query; a single 202-on-retry is handled by transparently
  re-polling and rendering; repeated 202-on-retry beyond the cap surfaces
  error.value without an infinite loop.

  Dual-tier parity: tests/test_frontend_production_achievement_parity.py
  executes the LITERAL SQL text (buildValuesTableSql/rollup/computeView,
  transcribed verbatim into Python) via the real `duckdb` package against
  build_achievement_rows() as golden -- 10/10 passed, including a
  case-variant-SPECNAME collapse case and an all-unmapped-SPECNAME
  empty-result case (the join-key risk implementation-plan.md flagged as
  highest-value). Filed CER-003 in context-manifest.md for this Python test
  file (not listed in the frontend-engineer sub-packet nor top-level Allowed
  Paths) per the harness prompt's explicit "note it and proceed"
  authorization, mirroring the already-approved CER-002 precedent; the CER
  also documents why tests/test_frontend_duckdb_parity.py +
  tests/fixtures/frontend_compute_parity.json were NOT extended (that fixture
  is single-purpose for a KPI-hours shaped consumer unrelated to
  achievement_rate, and the formula here lives entirely in SQL, not an
  importable pure JS function).

  Discovered (pre-existing, out of scope): frontend/tsconfig.json's `include`
