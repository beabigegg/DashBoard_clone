summary: >
  Implemented the backend half of the 生產達成率 report (IP-1..IP-6, IP-10 backend
  portion) per implementation-plan.md, following TDD (all test files authored
  before implementation). Added can_edit_targets()/targets_edit_required to the
  existing core/permissions.py (fail-closed, independent of admin_required).
  Created production_achievement_permission_service.py and
  production_achievement_target_service.py for direct-MySQL read/upsert via
  core/mysql_client.get_mysql_connection() (never sync_worker), with
  MYSQL_OPS_ENABLED-off/unreachable degrade semantics (reads -> null/empty,
  writes -> raise for 503). Created production_achievement_service.py (Oracle
  read via sql/production_achievement.sql — PA-05 predicate verbatim, PA-01..04
  shift_code/output_date as SQL CASE — plus a Python mirror for unit tests only)
  and production_achievement_routes.py (6 endpoints, registered in
  routes/__init__.py's register_routes()). Added the idempotent DDL script.
