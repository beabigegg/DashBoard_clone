decisions-made:
  - id: D-01
    description: |
      DuckDB count_sql uses a compound SELECT over combined CTE with subquery
      for divergent_groups count. The subquery approach (vs a separate second
      query) avoids re-executing the filter params twice while keeping the
      grouped CTE result available. Params list is doubled (params + params)
      because the CTE WHERE clause appears twice: once in grouped, once in raw.
    risk: low

  - id: D-02
    description: |
      stream_export builds the aggregation CTE with params + params (filter
      applied to grouped branch AND raw branch), then executes log_sql and
      page batches each with params + params. This matches compute_detail_page.
    risk: low

