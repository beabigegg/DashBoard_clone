# Acceptance oracle for this change (ADR 0010).
#
# HUMAN-AUTHORED. An implementation agent must not write this file (see the
# pre-tool-use-acceptance-write.sh hook, armed via
# `cdd-kit install-agent-hooks --acceptance-write`) -- an agent may only READ
# it to build a driver that feeds `input` into the real system and compares
# the result to `expect`; it must never invent or edit the answer key.
#
# HOW TO FILL THIS IN:
#   1. Replace the placeholder case below with at least one REAL case. Write
#      `given/when/then` in plain business language; put the exact payload the
#      implementation receives in `input` and the exact result it must
#      produce in `expect`.
#   2. `input`/`expect` can be any JSON-shaped value (a scalar, a string, or a
#      nested object/array) -- whatever the case actually exercises.
#   3. Add one entry per behavior you need proven. `cdd-kit gate` rejects this
#      file until at least one case has a non-placeholder `input` and `expect`
#      (AC-1) -- an all-placeholder file (like this scaffold) fails on
#      purpose, so the oracle is never silently skipped.
#   4. Once you are happy with the cases, ask a human maintainer to lock the
#      baseline (relock) so the gate can detect later tampering (AC-2).
#   5. `rules` are optional cross-cutting invariants that must ALWAYS hold,
#      independent of any single case (e.g. "a refund can never exceed the
#      original payment"). Leave the list empty if none apply yet.
#
# Example (for reference; delete or replace with your own case):
#   - id: over-limit-order-rejected
#     given: "a customer whose credit limit is 1000"
#     when:  "they submit an order for 1500"
#     then:  "the order is rejected with reason 'credit-limit-exceeded'"
#     input:  { customer_limit: 1000, order_amount: 1500 }
#     expect: { status: "rejected", reason: "credit-limit-exceeded" }

oracle-version: 0.1.0
authored-by: human

cases:
  - id: bonduph-raw-value-no-scale-conversion
    given: >
      a live read-only Oracle probe (run 2026-07-13 ~22:19, user-authorized,
      against DWH.EAP_EVENT/EAP_EVENT_DETAIL) observed a GDBA equipment
      (identifier redacted for confidentiality) emitting a BondUPH event with
      PARAMETER_VALUE = 12157 (confirmed via direct query, one of 617
      GDBA/BondUPH events found non-null in a 6h window spanning 118 distinct
      equipment)
    when: >
      the UphPerformanceJob pipeline processes this event (Oracle fetch ->
      DuckDB post_aggregate TRY_CAST -> parquet spool -> detail/ranking view)
    then: >
      the resulting UPH_VALUE for this event equals 12157 exactly -- no scale
      conversion (no x100, no /100, no rounding beyond the raw value) is ever
      applied, per UPH-04 (business-rules.md), regardless of whether the true
      physical UPH scale is later found to differ
    input:
      equipment_id: "GDBA-XXXX"
      family: "GDBA"
      parameter_name: "BondUPH"
      parameter_value_raw: "12157"
    expect:
      uph_value: 12157
      scale_conversion_applied: false

rules:
  - id: uph-value-always-raw
    statement: "UPH_VALUE presented anywhere in this feature (API response, parquet column, frontend display) must always equal the source EAP_EVENT_DETAIL.PARAMETER_VALUE unchanged -- no multiplication, division, or rounding beyond what TRY_CAST(...AS DOUBLE) does for type coercion (UPH-04)."
  - id: family-parameter-mapping-fixed
    statement: "GDBA events are always matched against PARAMETER_NAME='BondUPH' and GWBA events against PARAMETER_NAME='fHCM_UPH' -- this mapping must never be swapped or 'corrected' to a different parameter name observed in any other investigation (UPH-03)."
  - id: gwba-family-has-confirmed-uph-data
    statement: >-
      As of a live read-only Oracle probe (2026-07-13 ~22:19, user-authorized),
      GWBA equipment emits fHCM_UPH events with non-null values -- this
      reverses the 2026-07-08 investigation's zero-GWBA-signal finding (under
      the pre-reconfiguration parameter name) and confirms the page's GWBA
      family scope has real data to serve, not just GDBA. See
      agent-log/backend-engineer.yml's oracle-probe block and
      stress-soak-report.md's Data-Availability Probe section for the full
      observed counts. This is a point-in-time evidentiary fact, not a
      repeatable computation -- it is not re-driven in CI (no live Oracle
      access there), only cited.
