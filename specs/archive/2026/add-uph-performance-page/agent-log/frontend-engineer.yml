  (.github/workflows/frontend-tests.yml step + ci-gate-contract.md Gate
  Inventory row) are explicitly owned by "whoever lands the spec / ci-cd-
  gatekeeper" per this change's own ci-gates.md — not done here; flagging for
  that agent since the spec file now exists.
  Contract/quality test phases intentionally left unrun by this agent: the
  backend routes this page depends on are being implemented in parallel by
  another agent in the same change, so `cdd-kit validate --contracts` would
