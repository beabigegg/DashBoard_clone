summary: |
  Implemented the read-only GET /api/db-scheduling/queue endpoint end-to-end:
  service (db_scheduling_service.py), route (db_scheduling_routes.py), blueprint
  registration in routes/__init__.py, page_status.json entry, capture_samples
  endpoint + count bump, and regenerated both openapi.json files.
  All 30 new unit/contract tests pass. No regressions in 4908-test suite.

deviations: |
  1. Test names differ from test-plan.md's exact node IDs (e.g. test_all_db_start_lots_included
     vs my actual test_start_lots_filtered_by_specname). This is intentional — the plan's names
     were scaffolded targets and my tests cover the same AC rows; cdd-kit collect phase passed.
  2. The data-shape contract says lotId → CONTAINERNAME, but DWH.DW_MES_LOT_V's WIP cache
     stores LOTID (not CONTAINERNAME). Service uses LOTID as the source column for lotId output
     field, consistent with every other WIP service function (e.g. wip_service.py:1708).
  3. Blueprint registration in routes/__init__.py (not app.py ~904) — per the implementation
     plan's codebase-pattern correction.

equipments_fanout_finding: |
  EQUIPMENTS in DWH.DW_MES_LOT_V is a VARCHAR2 single-value column per the AI schema
  context comment ("目前加工機台編號清單" but treated as a single value by all existing
  consumers: qc_gate_service.py:170, wip_service.py:1708, 1909). The service treats each
  EQUIPMENTS cell as a single equipment ID (one row per running_eqp DataFrame row that
  passes filters). No comma-splitting is applied. If the Oracle view delivers multiple
  equipment IDs in a comma-delimited string in the future, the fan-out logic in
  get_db_scheduling_queue() must be updated to split on ',' before emitting rows.

