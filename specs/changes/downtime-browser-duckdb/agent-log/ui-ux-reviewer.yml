      R-1 (medium): Double-activation race — user clicks 清除條件 during in-flight activate() starts a second activate(). Guard: check state !== 'loading' before deactivate/re-activate.
  - type: medium-non-blocking
    notes: >
      L-1: No refreshing state indicator during refreshDuckdbViews() filter-change path.
      F-1: Granularity buttons still render but are no-ops in DuckDB mode.
      A-2: No aria-live/aria-busy during duckdbLoading.
      A-3: role=button on tr elements breaks table semantics.
      E-2: Error banners non-dismissible.
  - type: taxonomylabel-note
    notes: "Backend taxonomy label rename (改機換料 vs old 換型換線) is expected per design.md D5. Deployment runbook should note stale bookmark mismatch risk."
