artifacts:
  - type: blocking-findings
    notes: >
      E-1 (high): DuckDB error copy is one-size-fits-all; parquet-expired case tells user to narrow date range (wrong advice). Fix: classify error in composable (fetch / wasm_init / compute) so App.vue chooses appropriate copy.
      A-1 (high): legacy ErrorBanner instance has no aria-label/role=alert. Asymmetric with DuckDB banner.
      E-3 (medium): CSV export failure is silent console.error. Surface to duckdbError or toast.
