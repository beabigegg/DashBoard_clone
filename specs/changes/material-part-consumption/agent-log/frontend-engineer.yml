summary: |
  Implemented the complete material-consumption Vue3 SPA (料號用量報表)
  including TDD Vitest unit tests, Playwright E2E/resilience/data-boundary
  specs, 5 components, the useConsumptionQuery composable, scoped CSS,
  and portal-shell registration. All verification gates pass.

  UX reviewer pass-2 (2026-05-20): Fixed all 5 blocking a11y/loading-state
  bugs before release. BLOCKING-1: separated isSummaryLoading (page-level)
  from isViewLoading (block-level) for granularity switches. BLOCKING-2:
  added full WAI-ARIA tab widget (tablist/tab/tabpanel + aria-selected/controls/
  labelledby) to App.vue tab bar. BLOCKING-3: replaced custom chart-loading divs
  in ConsumptionTrendChart and TypeBreakdownChart with BlockLoadingState component.
  BLOCKING-4: removed concurrent LoadingOverlay + pending text in DetailTable async
  branch; now uses descriptive text only. BLOCKING-5: wrapped MultiSelect controls
  in role="group" + aria-labelledby to semantically associate labels. NON-BLOCKING-1:
  added aria-pressed to FilterPanel granularity buttons.

