notes: |
  - switchGranularity() calls GET /view only, never POST /query (AC-3 / MC-03)
  - isViewLoading (new) used only for granularity regroup; isSummaryLoading only for initial POST /query
  - BlockLoadingState imported from shared-ui in ConsumptionTrendChart, TypeBreakdownChart, DetailTable
  - Tab panels use v-show (not v-if) to preserve chart DOM state across tab switches
  - MultiSelect shared by 12 apps; no emit/prop surface changed (additive only)
  - Focus return handled by MultiSelect.vue::closeDropdown() (existing pattern)
  - echarts callback params annotated with '// TODO: type echarts callback' per CLAUDE.md
