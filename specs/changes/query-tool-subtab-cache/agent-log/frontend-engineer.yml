change-id: query-tool-subtab-cache
status: complete
summary: >
  Implemented sub-tab query caching per implementation-plan.md IP-1/IP-2/IP-3.
  useLotEquipmentQuery.setActiveSubTab() now returns early when queried[tab] is
  already true (no new invalidation needed — clearResults() already resets
  queried.* on every lookupEquipment() call). useEquipmentQuery.setActiveSubTab()
  got the same guard, plus new invalidation wiring it previously lacked: a private
  invalidateQueryCache() helper resets queried.{lots,jobs,rejects,timeline}, wired
  from setSelectedEquipmentIds() and from a `watch([startDate, endDate], ...,
  { flush: 'sync' })` (App.vue mutates those refs directly with no setter
  boundary). useLotDetail.ts was audited only, per plan — its loaded.* gate
  already implements the same pattern correctly; no production edit made, only a
  pinning regression test. Guard was placed only inside setActiveSubTab() in both
  composables, never inside queryActiveSubTab()/query*()/pagination, preserving
  AC-5 explicit-refresh semantics. Added the full AC->test matrix from
  test-plan.md: extended useLotEquipmentQuery.test.js, created
  useEquipmentQuery.test.js (new), added one pinning test to
  useLotDetail.pagination.test.js. All target tests plus the pre-existing
  tests/legacy/query-tool-composables.test.js pass; vue-tsc --noEmit is clean.
  Note: during this session useLotEquipmentQuery.ts also picked up unrelated
  concurrent changes (async job polling, container_names payload field, a
  CONTAINERNAME .trim() fix) from what appears to be a parallel agent/session
  working the same file — those are not part of this change's diff; my edit is
  isolated to the setActiveSubTab guard.
