findings: |
  Migration complete with strict zero behavior change. Type-check result: `npm run type-check` passes with 0 errors (clean run). Vitest results: `npm run test -- --run production-history` → 7/7 passed; `npm run test -- --run useProductionHistory` → 16/16 passed (validation tests). Legacy `node --test tests/legacy/production-history.test.js` → 11/11 passed.

  Decisions:
  - Interfaces are exported from `composables/useProductionHistory.ts` rather than a sibling `types.ts`. Single-file approach matches hold-history/reject-history precedent and keeps the composable + types co-located. App.vue and the two SFC components import the types from the composable.
  - For ErrorBanner with `error` ref (`string | null`), used `error || ''` in the template binding. Alternative would be re-typing error as `string` (default `''`), but that changes the public API of the composable; chose the template-level coercion instead.
  - All cross-module imports are TS already (`shared-ui`, `shared-composables`, `core/`), so no `@ts-expect-error` boundary shims were needed. No `as any` introduced anywhere.
  - No echarts callbacks in this app (matrix is a custom tree table).

  Audit verifications:
  - `frontend/src/production-history/index.html` NOT modified — `git diff --stat` reports 0 changes; Vite resolves `main.ts` from `./main.js` reference per CLAUDE.md rule.
  - No Python parity/safety tests reference production-history JS source paths (grep confirmed).
  - `frontend/tests/legacy/production-history.test.js` does not read source files (pure inline test); no edits required.
  - `frontend/tests/validation/useProductionHistory.validation.test.js` imports from `core/dev-warnings.js`, `core/endpoint-schemas.js`, `core/schema-guard.js` — those are extension-less in TS resolver and unaffected by this migration; no edits required.

  Edge case: useProductionHistory.js previously imported `apiGet` but never called it; removed the unused import in the TS version. Also removed unused `computed` import. These are dead-code removals only.

  Type-strictness: composable runtime cast `as QueryResponseEnvelope` etc. is necessary because `apiPost` is generically typed as `Promise<ApiResponse<T = unknown>>` — without per-call casts, every `resp.data.X` access would require runtime guards. Casts are confined to the immediate response-handling expression to minimize untyped surface.
