agent: spec-architect
change-id: prod-history-first-tier-cache-filters
status: complete
date: 2026-05-14
verdict: |
  Tier 1 architecture review complete. Cross-filter strategy resolved to Option B
  (cached 4-tuple set + in-memory filter). Wildcard grammar pinned to single-`*`
  with 2-char anchor and SQL-meta rejection. Schema-version + multi-worker file
  lock added as rollback / safety mechanisms.
key-decisions:
  - id: D1
    decision: Cross-filter via cached 4-tuple DISTINCT set + in-memory filter (Option B)
    rationale: |
      Cardinality budget ~5k-20k tuples ≤ 2.4 MB JSON. In-memory filter is < 5 ms.
      Option A (live SQL/keystroke) creates DBA load + latency jitter.
      Option C (flat lists + filtered subquery) still needs Oracle co-occurrence
      join — strictly worse than B.
  - id: D2
    decision: Wildcard grammar = single `*` any position, min 2-char anchor, max 100 patterns/field
    rationale: |
      Matches existing material-trace UX. Pure `*` and multi-`*` rejected.
      SQL meta chars (`'`, `;`, `--`, `/*`, `*/`, control chars, null) rejected
      before Oracle bind. Internal `%`/`_` escaped via `ESCAPE '\'`.
  - id: D3
    decision: Cache payload carries schema_version=2; mismatch → drop + rebuild
    rationale: |
      No prior cache in this repo has schema_version. Enables rollback by version
      flip alone (no `redis-cli DEL`). New convention — document in ci-gates.md
      and promote to CLAUDE.md after archive.
  - id: D4
    decision: Reuse resource_history_duckdb_cache._try_lock/_release_lock pattern
    rationale: |
      Battle-tested file-based O_CREAT|O_EXCL sentinel at
      `tmp/container_filter_cache.loading`. Losers poll every 5 s for 90 s.
      Cite resource_history_duckdb_cache.py:44-65 in backend implementation.
  - id: D5
    decision: Oracle LIKE hardening = 2-char anchor, infix only if ≥ 4 anchor chars, no ROWNUM cap in v1
    rationale: |
      Main query already has chunked TRACKINTIMESTAMP window — primary scope cap.
      ROWNUM cap deferred unless monkey/stress tests reveal pathological latency.
  - id: D6
    decision: Remove (not hide) MFGORDERNAME / CONTAINERNAME / FIRSTNAME from second-tier
    rationale: |
      Conditional hiding produces dual-state bugs (first-tier wildcard `MA*` vs
      second-tier literal `MA2025X`). Single source = first-tier wildcard textarea.
  - id: D7
    decision: New GET `/api/production-history/filter-options?selected=<json>` endpoint
    rationale: |
      Separates Oracle-cached (low cardinality) from spool-derived (WorkCenter /
      Equipment) options. GET because pure-read + idempotent; query-string size
      budget ~6 KB fits comfortably within 8 KB.
