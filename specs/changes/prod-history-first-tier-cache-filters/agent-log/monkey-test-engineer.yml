# ────────────────────────────────────────────────────────────────────────────
# Notable findings (documented behaviours)
# ────────────────────────────────────────────────────────────────────────────
findings:
  - id: F1
    title: "10 KB single wildcard token is ACCEPTED by the parser"
    severity: informational
    body: |
      `parse_wildcard_tokens('mfg_orders', 'A' * 10_000)` returns a single
      `exact` WildcardToken with `bound_value` of length 10 000 — no
      per-token length cap exists today. This matches the design
      (dependency-security-reviewer §4 + R1) and is bounded in practice
      by MAX_JSON_BODY_BYTES (262 144). Test
      `test_main_query_oversized_wildcard_input_single_huge_token_accepted`
      pins this behaviour so a future per-token cap (R1) deliberately
      breaks the test, prompting a contract update.

  - id: F2
    title: "|| and DBMS_*/UTL_* identifiers pass parser as `exact` literals"
    severity: informational
    body: |
      Confirmed empirically — these reach a bound parameter, never the SQL
      parser. Test `test_wildcard_oracle_hostile_concat_passes_as_literal`
      asserts both the parser-level acceptance AND a non-500 route
      response. This matches dependency-security-reviewer §3 closeout.

  - id: F3
    title: "ZWSP / RTL / full-width characters survive the parser verbatim"
    severity: informational
    body: |
      U+200B, U+202E, U+FF11 all flow through as literal bytes in the
      `bound_value`. Acceptable for SQL safety; the UX implication
      (look-alike tokens won't match) is captured in
      dependency-security-reviewer R2 as a non-blocking recommendation.

  - id: F4
    title: "Per-token 100-cap enforced before dedup completes"
    severity: informational
    body: |
      With 101 unique tokens, the error message includes "100" — verified
      by `test_main_query_oversized_wildcard_input_token_count_capped`.
      The cap is enforced AFTER each `seen_keys` check inside the loop
      (see request_validation.py:308-313), so the 101st *unique* token
      triggers the raise. A 200-token list of duplicates collapses to 1
      via dedup and never hits the cap — consistent with the design.

  - id: F5
    title: "MA/*25 and MA*/25 BOTH rejected via meta-char regex, not multi-star"
    severity: informational
    body: |
      Initially expected `MA*/25` to be rejected by the multi-star rule
      (it has only one literal `*`, followed by `/`). Actual:
      `_WILDCARD_META_RE` matches `*/` first, raising on the meta-char
      branch. Either rejection is acceptable; documented here for
      future maintainers reading test assertions.

