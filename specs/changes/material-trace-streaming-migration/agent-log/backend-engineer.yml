deviations:
  - id: DEV-01
    step: IP-3
    description: >
      MaterialTraceJob is NOT a true BaseChunkedDuckDBJob subclass (abstract base class
      requires concrete pre_query() signature returning None, not QueryPlan). Instead it
      implements the same streaming pattern with its own run() method that calls
      pre_query() -> chunked Oracle fetch via OracleArrowReader -> post_aggregate().
      The interface contract (namespace, chunk_strategy=ID_LIST, requires_cross_chunk_reduction=False,
      no _check_memory_guard) is preserved. All design.md D1/D2/D3/D4 decisions honored.
    risk: low — behavior identical, only class hierarchy differs

  - id: DEV-02
    step: IP-3 build_chunk_sql
    description: >
      SQL is built using QueryBuilder.build() (same as legacy _execute_batched_query_to_parquet).
      The allow_patterns=False branch for lot-mode resolved CONTAINERIDs calls
      _add_exact_or_pattern_condition with exact IDs (no wildcards) — same semantics as legacy.

known-risks:
  - The DISTINCT dedup key exactly matches legacy L237-238 [CONTAINERID, MATERIALLOTNAME, WORKCENTERNAME, TXNDATE].
  - Arrow decimal128→float64 coercion is applied per-batch in run() (pa.types.is_decimal check).
  - WORKCENTER_GROUP enrichment applied in post_aggregate() via DuckDB LEFT JOIN on mapping dict.
  - Spool key computed via make_route_query_hash (same as legacy execute_to_spool) — idempotency preserved.
  - Module-level flag MATERIAL_TRACE_USE_UNIFIED_JOB frozen at import; test with monkeypatch.setattr, not setenv.

next-reviewer: test-strategist (IP-7 — tests/test_material_trace_unified_job.py + tests/contract/test_env_material_trace_flag.py)
