post-implementation-fix:
  reported-by: user (live manual test against real Oracle DWH, 2026-07-13 20:50)
  symptom: "ORA-00900: invalid SQL statement, job_id=uph-performance-*, raised from OracleArrowReader.chunk_iter -> cursor.execute"
  root-cause: >-
    SQLLoader.load_with_params substitutes `{{ NAME }}` placeholders via a
    PLAIN GLOBAL string replace across the whole .sql file -- it also
    rewrites the placeholder's own mention inside this template's doc-comment
    header, not just the real WHERE-clause injection site.
    `_build_equipment_ids_filter`/`_build_container_exists_filter`/
    `_build_workcenter_names_exists_filter` originally returned fragments
    prefixed with a literal "\n  AND ..." (embedded newline). Whenever ANY
    coarse filter was active, that embedded newline got spliced into the
    header comment's "{{ EXTRA_FILTERS }}" mention too, splitting a single
    `--`-commented line in two -- the back half of that line was no longer
    prefixed with `--`, so Oracle received live uncommented garbage text
    ahead of the actual SELECT and rejected the whole statement.
  fix: >-
    (1) The three builder functions no longer return an embedded newline --
    `pre_query()` now adds the "\n  " separator once, only at the
    concatenation site that feeds the real WHERE clause. (2) The template's
    doc comment no longer spells out the literal "{{ FAMILY_FILTER }}" /
    "{{ EXTRA_FILTERS }}" tokens (rephrased as prose so SQLLoader's global
    replace can never re-corrupt it in the future, regardless of what any
    placeholder's value contains).
  verification: >-
    Re-ran the exact rendered query via OracleArrowReader.chunk_iter (the
    real failing code path) against the live Oracle DWH for 8 cases: default
    (both families), GDBA-only, GWBA-only, each of the four coarse filters
    individually, and all four combined -- all 8 succeeded (previously: any
    case with a non-empty coarse filter failed with ORA-00900). Added
    TestFullTemplateRenderNeverCorruptsHeaderComment (4 new tests) asserting
    (a) builder fragments never embed a newline, (b) the rendered header
    comment stays fully commented with zero and with all-four filters
    active, (c) the real WHERE clause still receives every combined fragment
    correctly, and (d) the template's own prose never re-introduces the
    literal placeholder-brace token. Full uph_performance test suite (114
    tests, includes --run-integration/--run-integration-real markers)
    re-run clean; ruff clean.
  fixed-by: main Claude (direct edit, not a subagent) -- user explicitly
    authorized live Oracle access for this diagnosis after the harness's
    auto-mode classifier blocked the first attempt (see conversation).
