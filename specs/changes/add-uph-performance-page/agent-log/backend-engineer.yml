oracle-probe:
  outcome: executed-post-implementation-confirmed-non-empty
  detail: >-
    IP-0 mandatory pre-build probe was initially blocked in-band by the
    harness's auto-mode safety classifier during backend implementation (no
    live Oracle query executed at that time). It was subsequently run
    directly by main Claude on 2026-07-13, with explicit user authorization
    for live Oracle access, AFTER implementation completed -- a <=6h
    LAST_UPDATE_TIME-windowed, index-bound, read-only GROUP BY probe (no
    correlated subqueries, per the query-cost guidance in
    docs/architecture/eap-event-uph-collection-investigation.md) against the
    real Oracle DWH (the configured internal DB_HOST, same connection this
    app already uses for all its normal operation; host details redacted
    from this durable log for confidentiality).
  probe-result: >-
    CONFIRMED non-empty for BOTH parameters in the most recent 6h window
    (run 2026-07-13 ~22:19): GDBA/BondUPH -- 118 distinct EQUIPMENT_ID, 617
    events, 617/617 non-null PARAMETER_VALUE (100%), sample values in the
    9581-12157 range (integer-looking). GWBA/fHCM_UPH -- 46 distinct
    EQUIPMENT_ID, 259 events, 259/259 non-null PARAMETER_VALUE (100%), sample
    values in the 7750.36-21752.30 range (includes decimals). This directly
    reverses the 2026-07-08 investigation's finding of ZERO GWBA machines
    emitting any UPH parameter -- consistent with the user's account that
    GWBA/fHCM_UPH reporting was configured recently. Value-scale caveat from
    the original investigation (whether these integers are raw or an
    implicit x100) remains UNRESOLVED, but is moot for this change per UPH-04
    (deliberate no-scale-conversion decision, independent of what the true
    physical scale is).
  residual-risk: >-
    RESOLVED for the "does data exist at all" question (see probe-result
    above) -- this was the primary residual risk flagged by qa-reviewer's
    approved-with-risk verdict. Remaining, smaller residual risk: this was a
    single point-in-time 6h sample: coverage could still vary by shift/time-
    of-day, and the value-scale ambiguity (see above) is inherited, unresolved
    product-spec territory outside this change's scope (UPH-04 already
    decided raw-value display regardless). No code or contract change is
    required as a result of this probe -- it is confirmatory evidence only.
