implementation-notes: |
  - IP-5: Added pjTypes/packages to filters reactive, CommittedFilters interface,
    SessionCache.filters interface, committedFilters initial value, snapshotFilters(),
    and buildFilterParams() (emits as pj_types/packages when non-empty).
  - IP-6: FilterBar gains pjTypeOptions/packageOptions props; two MultiSelect controls
    added with data-testid="pj-type-select" and data-testid="package-select", placed
    after date range inputs and before loss-reasons MultiSelect.
  - IP-7: New useContainerFilterOptions.ts composable: fetches on mount, debounced
    200ms re-fetch on selection change via watch, stale-response in-flight token guard,
    _lastCommitted snapshot-diff to avoid spurious re-fetches. Exports _buildContainerFilterUrl
    for pure-function testability (mirrors _buildUrl in useFirstTierFilters.ts).
  - IP-8: App.vue instantiates composable with toRef(filters,'pjTypes') and
    toRef(filters,'packages'); passes pjTypeOptions/packageOptions to FilterBar.
  - IP-9: Legacy tests (node:test): 3 new _buildContainerFilterUrl pure-function tests,
    test_app_filters_state_includes_pj_types_and_packages, test_cross_filter_type_selection_narrows_package_options,
    2 additional composable behavior tests. Playwright: MOCK_CONTAINER_FILTER_OPTIONS added,
    installBaseRoutes updated (LIFO: container-filter-options registered before station/loss-reasons),
    3 new E2E tests (type multiselect render, package multiselect render, cross-filter narrowing).

