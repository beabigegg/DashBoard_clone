notes: >
  Implemented IP-1..IP-6 exactly per implementation-plan.md. IP-1: equipment_lots.sql
  now TRIMs c.CONTAINERNAME (matching the existing TRIM(c.PRODUCTLINENAME) sibling
  treatment) and adds an optional {{ CONTAINER_FILTER }} placeholder to the WHERE
  clause (documented in the header comment). IP-2: get_equipment_lots() gained a
  kwarg-only container_names: Optional[List[str]] = None; per the flagged
  param-collision risk, both EQUIPMENT_FILTER and CONTAINER_FILTER conditions are
  built on the SAME QueryBuilder instance (builder.conditions[0]/[-1]), not a
  second QueryBuilder() — this avoids the bind-param counter restarting and
  clobbering the equipment_ids IN-list params. Values are uppercased+stripped in
  Python and matched via UPPER(TRIM(c.CONTAINERNAME)) IN (...), matching the
  existing CHAR-column convention used elsewhere (e.g. yield_alert/reason_detail.sql).
  Omitted/empty container_names -> CONTAINER_FILTER="1=1" (AC-6 backward compat,
  verified by exact-dict param assertion in
  test_equipment_lots_omitted_container_names_unchanged_behavior). IP-3/IP-4: wired
  container_names through query_equipment_period()'s body parse, the async _params
  dict, the sync get_equipment_lots() call, and execute_query_tool_job()'s
  query_sub_type=='lots' branch — closing the sync/async parity gap the plan
  flagged as the core AC-4 risk. IP-5: added TestGetEquipmentLots (backend-only,
  since no such class existed yet in tests/test_query_tool_service.py — only a
  pagination-focused test existed in test_query_tool_pagination_contract.py, left
  untouched), extended TestEquipmentPeriodEndpoint, and added
  TestEquipmentPeriodLotsParity (new class; existing TestFlagOnOversizedQuery/
  TestFlagOffParity only covered status_hours, left untouched) including an
  inspect.signature(get_equipment_lots).bind(**kwargs) check wrapped around the
  worker's actual get_equipment_lots() call (a MagicMock alone would not have
  caught a kwarg-name mismatch — this is the pattern documented in
  docs/architecture/test-discipline.md's Async Route<->Worker Signature Contract).
  IP-6: regenerated both contracts/openapi.json and contracts/api/openapi.json via
  `cdd-kit openapi export`; both now report info.version 1.38.3 matching
  api-contract.md (was 1.38.2, per the known openapi-sync-gate risk).
  `cdd-kit validate` passes clean (contracts, API semantic, API conformance,
  response-shape, env semantic/contract, CI gates, spec traceability, contract
  versions — all green; pre-existing yield_alert_dataset spool warning is
