bug-fix:
  schema-version: 0.1.0
  symptom: >
    21 of 133 Playwright E2E specs fail on every run — timeout at 60s,
    element-not-found, waitForRequest never fires, element-outside-viewport,
    or waitForResponse never fires.
  observed_surface: "frontend/tests/playwright/ — 9 spec files across 6 distinct symptom groups"
  expected_behavior: >
    All 133 specs pass (or skip via pre-existing intentional guards).
    No spec depends on Oracle availability to pass.
  actual_behavior: >
    109 passed / 21 failed / 3 skipped. Failures across 9 spec files grouped
    into 6 distinct root-cause categories (Groups A–F).
  reproduction:
    status: reproduced
    command: "cd frontend && npx playwright test --reporter=list"
  hypotheses:
    - id: H-A
      candidate: "frontend/src/production-history/App.vue:494"
      reason: "button:has-text('查詢').first() matched tab button in DOM before submit button at L494"
      result: confirmed
    - id: H-B
      candidate: "frontend/src/portal-shell/App.vue:53"
      reason: "sidebarOpen=ref(false) and route watcher closes sidebar on every nav; raw click hits element outside viewport"
      result: confirmed
    - id: H-C
      candidate: "frontend/tests/playwright/hold-history-flat-table.spec.js:1"
      reason: "page.goto hash-URL bypassed loginViaApi; router guard redirected to /login; hold-history never mounted"
      result: confirmed
    - id: H-D
      candidate: "frontend/src/wip-overview/MatrixTable.vue:1"
      reason: "waitForSelector:'table' never resolves; <table> is gated on workcenters.length; WIP stub mock returns empty data"
      result: confirmed
    - id: H-E
      candidate: "frontend/tests/playwright/production-history-pruning-feedback.spec.ts:1"
      reason: "waitForResponse registered after navigateViaSidebar; onMounted filter-options call already fired and gone"
      result: confirmed
    - id: H-F
      candidate: "frontend/tests/playwright/reject-history.spec.js:1"
      reason: "no page.route() mocks; all queries hit real /api/reject-history/query; Oracle slowness caused 60s timeout"
      result: confirmed
  root_cause:
    pointer: "frontend/tests/playwright/production-history-multi-line-input.spec.ts:111"
    summary: >
      6 independent root causes across 9 spec files. Group A: wrong submit-button
      selector (has-text substring matched tab buttons before submit). Group B:
      sidebar closed by default; raw click failed off-screen. Group C: hash-URL
      goto bypassed auth guard. Group D: <table> gated on data; selector changed
      to always-rendered .matrix-container. Group E: waitForResponse registered
      after the mount request already fired. Group F: reject endpoints had no
      page.route mocks; real Oracle hit caused 60s timeout. Full mapping in
      implementation-plan.md §Groups A–F.
  fix:
    files_changed:
      - frontend/tests/playwright/production-history-multi-line-input.spec.ts
      - frontend/tests/playwright/production-history-wildcard-paste.spec.ts
      - frontend/tests/playwright/production-history-pruning-feedback.spec.ts
      - frontend/tests/playwright/job-abandon-on-unload.spec.js
      - frontend/tests/playwright/resilience/browser-history.spec.js
      - frontend/tests/playwright/hold-history-flat-table.spec.js
      - frontend/tests/playwright/wip-matrix-drilldown.spec.js
      - frontend/tests/playwright/reject-history.spec.js
      - frontend/tests/playwright/reject-material-flat-table.spec.js
    summary: >
      Retargeted submit button selector to [data-testid="ph-query-btn"] (Groups A).
      Added sidebar open via navigateViaSidebar helper before nav links (Group B).
      Added loginViaApi + navigateViaSidebar for hold-history async tests (Group C).
      Changed waitForSelector from 'table' to '.matrix-container' (Group D).
      Moved waitForResponse registration before navigateViaSidebar call (Group E).
      Added page.route mocks for all reject-history and material-trace endpoints
      with populated detail.items rows (Group F). Zero production source changes.
  regression:
    status: passed
    command: >-
      cd frontend && npx playwright test
      tests/playwright/production-history-multi-line-input.spec.ts
      tests/playwright/production-history-wildcard-paste.spec.ts
      tests/playwright/job-abandon-on-unload.spec.js
      tests/playwright/resilience/browser-history.spec.js
      tests/playwright/hold-history-flat-table.spec.js
      tests/playwright/wip-matrix-drilldown.spec.js
      tests/playwright/production-history-pruning-feedback.spec.ts
      tests/playwright/reject-history.spec.js
      tests/playwright/reject-material-flat-table.spec.js
      --reporter=list
    summary: "specs/changes/fix-e2e-spec-failures/test-runs/20260615-142844/summary.json"
  residual_risk: >
    Group D (wip-matrix-drilldown) 4 tests now skip via pre-existing test.skip
    guard (no Oracle data in WIP stub mock → no matrix cells → skip as designed
    per AC-4). Tests will pass when Oracle data is available or WIP mock is
