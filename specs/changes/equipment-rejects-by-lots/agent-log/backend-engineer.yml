summary: >
  Rewrote the equipment-rejects service/SQL from aggregate-by-EQUIPMENTNAME
  to per-reject-event detail via LOTWIPHISTORY→CONTAINERID→LOTREJECTHISTORY join.
  Followed TDD: tests written first (all failed), then IP-1..IP-3 implementation,
  then contracts updated, cdd-kit validate green, full suite 3979 passed.

tdd-evidence:
  pre-implementation-failure: >
    TestGetEquipmentRejects::test_get_equipment_rejects_cross_station_lot
    failed with TypeError (equipment_ids unexpected keyword argument) — as expected.
    TestEquipmentPeriodRejectsDetailSchema::test_equipment_period_rejects_detail_schema
    failed with 400 (route checked equipment_names which was empty) — as expected.

design-decision:
  ac4-short-circuit: >
    Chose single-SQL design (equipment_lot_rejects.sql) relying on the inner CTE
    wip_lots → JOIN chain to return zero rows when no CONTAINERID is matched.
    The AC-4 guard is at validate_equipment_input level (empty equipment_ids →
    UserInputError before SQLLoader is called) — so mock_read.assert_not_called()
    passes cleanly.

