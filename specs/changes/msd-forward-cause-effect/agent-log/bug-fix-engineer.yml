      - src/mes_dashboard/services/msd_duckdb_runtime.py
      - tests/test_msd_duckdb_parity.py
      - tests/test_unified_spool_integration.py
    summary: "Rewrote _get_forward_summary to: load detection_df from detection spool (with _apply_population_mask + loss_reason soft-mask), build detection_data via _build_detection_lookup, reconstruct wip_by_cid and downstream_rejects from events spool (same logic as _get_forward_detail), load forward_lineage_spool when present, then call all the existing Phase-3 builders (_attribute_forward_defects, _build_forward_kpi, _build_forward_charts, _build_daily_trend, _build_by_detection_loss_reason, _build_loss_reason_workcenter_crosstab, _build_downstream_trend, _compute_amplification_kpi). Also passed station_order_fallback from get_summary into _get_forward_summary. Updated test_msd_duckdb_parity.py and test_unified_spool_integration.py to use correct forward KPI keys and dict-based charts."
