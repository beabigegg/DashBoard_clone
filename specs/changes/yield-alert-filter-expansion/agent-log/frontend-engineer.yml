summary: >-
  Implemented IP-6/IP-7/IP-8 in frontend/src/yield-alert-center/. IP-7:
  extended PROCESS_TYPE_OPTIONS in App.vue with 4 new entries (GD%/F%/W%/D%,
  labels 重工/委外/WIP/其他). Verified watch(selectedProcessType, ...) at
  App.vue:805-824 is genuinely value-change-keyed (guards only on `!oldVal`
  for initial-mount skip, not on specific GA%/GC% values) — already
  generalizes to all 6 values, no fix needed. IP-8: wired workcenter_groups
  from the /view response (applyFullView) and /cross-filter-options response
  (fetchCrossFilterOptions) into workcenterGroupOptions.value, leaving the
  /filter-options initial-load seed (loadFilterOptions, :316-331) unchanged as
  required. IP-6: added a raw-DEPARTMENT_NAME SELECT DISTINCT dimension
  emitting workcenter_groups to queryFilterOptions() in useYieldAlertDuckDB.ts
  for WASM-path parity with the server's _query_filter_options(); left
  buildDimensionWhere's unrelated departments->DEPARTMENT_GROUP filter-apply
  mapping untouched. Wrote tests before/alongside each source edit (TDD):
  extended useYieldAlert.validation.test.js (6-value enum), extended
  App.cross-filter.test.js (parametrized watcher/force-requery test over
  GD%/F%/W%/D%, plus 2 new tests proving workcenter_groups wiring from both
  /view and /cross-filter-options), added new
  useYieldAlertDuckDB.departments.test.js (WASM parity + raw-column + empty-
  spool + sentinel-exclusion coverage), and parametrized/extended
  yield-alert-center.spec.ts Playwright spec (process_type filter over 5
  values, new 6-option-render test). Ran the full suite against a rebuilt
  static bundle (npm run build) since the live E2E server was gunicorn
  serving a stale pre-change build, not Vite dev/HMR.
i18n-finding: >-
  No i18n system exists anywhere in frontend/src/ (confirmed via repo-wide
  grep for i18n/useI18n/locale — zero hits, no locale/translation files in the
  tree). PROCESS_TYPE_OPTIONS labels in App.vue are hardcoded Traditional
  Chinese strings directly in the options array literal, not routed through
  any i18n key mechanism. Per the plan's i18n instruction ("if hardcoded
  strings not routed through an i18n key, no i18n sync needed") — confirmed
  this is the hardcoded-literal case; no i18n file sync required or performed.
watcher-finding: >-
  The existing watch(selectedProcessType, (_newVal, oldVal) => { if (!oldVal)
  return; ...clear state... }) at App.vue:805-824 was already
  value-change-keyed, NOT special-cased to GA%/GC%. It fires on any change
  away from a truthy previous value (the `!oldVal` guard only skips the
  initial-mount watcher invocation where oldVal is undefined). Verified via
  App.cross-filter.test.js parametrized test switching to each of
  GD%/F%/W%/D% — state (query_id, dimension filters/options, summary/trend/
  heatmap/station/package/alerts) clears correctly on every new value, and
  Playwright confirms the same end-to-end for all 5 non-default values. No
  source fix was required for this item.
