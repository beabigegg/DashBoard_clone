  CONTRACT FIX (flagging per task instructions, not silently improvised):
  While running the required `cdd-kit validate --contracts` gate, found a
  genuine PRE-EXISTING defect (predates my IP-6..IP-9 work, from the
  already-frozen Phase-0 contract-authoring pass): the 5 new endpoints'
  response schemas (package-lf-map/workcenter-merge-map/daily-plans GET +
  known-package-lf-values/known-workcenter-groups) were registered as BARE
  shapes (`FooRow[]` or an un-enveloped object), but the actual Flask routes
  correctly use the site-wide `{success, data, meta}` envelope (via
  `core/response.py`'s `success_response()`, per CLAUDE.md convention) — the
  SAME pattern the sibling `/targets` endpoint's `ProductionAchievementTargetsResponse`
  already uses correctly. api-contract.md's own Compatibility Notes prose
  (line ~496) already NAMED the intended schemas as ".../Row`/`Response`" for
  each table, so the un-enveloped registration looks like an oversight in
  completing that intent, not a deliberate design choice. Fixed via the
  sanctioned CLI (never free-form Edit, per the repo's hook):
  `cdd-kit contract schema set` (new schemas ProductionAchievementPackageLfMapResponse
  / WorkcenterMergeMapResponse / DailyPlanResponse, each `{success, data:
  Row[], meta: ProductionAchievementResponseMeta}`; redefined the 2 existing
  known-values Response schemas in place the same way) + `cdd-kit contract
  endpoint set --response <name>` (repointed the 3 GET rows) + `cdd-kit
  openapi export --out contracts/openapi.json` and `--out
  contracts/api/openapi.json` (both re-synced, `--check` clean) +
  `cdd-kit validate --contracts` now fully green. This changes ONLY the
  contract's OWN description of already-correct wire behavior — no backend
  route, no frontend call site, and no test fixture needed to change as a
  result (my frontend code already assumed/consumed the correct enveloped
  shape throughout, since that's what the real Flask backend actually
  returns). Flagging for contract-reviewer/qa-reviewer awareness since this
  is contract-authoring territory outside my own IP-6..IP-9 file-level plan.

  DEVIATION FLAG (interaction-design.md / OD confirmed items): none — all 12
  OD items (OD-1 through OD-12) implemented exactly as transcribed in
  `## Confirmed`, no reinterpretation. Two secondary implementation-judgment
  calls NOT pinned by any OD or contract (documented here for visibility,
  per "report discrepancies" instruction, not because they contradict a
  confirmed decision):
    1. OD-7 persistence mechanism: chose sessionStorage (one of the 3 options
       implementation-plan.md explicitly left to my judgment: "route query
       params, a shared composable/store, or sessionStorage"), keyed
       `production-achievement:last-report-state`, storing {mode,
       workcenter_group} only (not custom-range dates, per OD-7's literal
       "mode and station-group" scope).
    2. D3 cumulative-trend per-day denominator when a package_lf_group lacks
       a daily-plan row: business-rules.md PA-13 does not fully pin this
       corner (only that same-day actual/plan must sum-then-divide when
       MAGNITUDES differ). Implemented as SQL `SUM(daily_plan_qty)` (ignores
       NULL, i.e. a missing-plan group contributes 0 to that day's plan sum
       rather than making the whole day's rate null) — see the code comment
       at useProductionAchievementDuckDB.ts's computeCumulativeView trend SQL.

