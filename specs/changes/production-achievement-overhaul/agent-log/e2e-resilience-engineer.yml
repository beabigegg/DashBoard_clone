  BUG FOUND AND FIXED (reportTable() selector, 4 files): App.vue passes
  `data-testid="pa-report-table"` directly to `<DataTable>` (its 2 usages,
  daily + cumulative). DataTable.vue's OWN template separately hard-codes
  `data-testid="datatable"` on that exact same root `<div>`. Vue 3's
  single-root attrs-fallthrough merge means the PARENT-supplied
  `data-testid="pa-report-table"` overrides the child's own static one in the
  final rendered DOM -- an HTML attribute can only hold one value, so both
  cannot coexist. All 4 of production-achievement.spec.js /
  production-achievement-async.spec.ts / resilience/*.spec.js /
  data-boundary/*.spec.js defined a `reportTable(page)` helper that searched
  for `[data-testid="datatable"]`, which -- once the app actually renders --
  would ALWAYS match zero elements, making every assertion chained off it
  (`.toBeVisible()`, `.locator('[data-testid="datatable-row"]')`, etc.) fail
  or hang. This was invisible in every recorded prior run because those runs
  either used `--list` (parse-only) or hit the "page not rendered yet, early
  return" guard (no live server) -- the exact scenario Environment Blocker #2
  describes. PROOF (not a guess): frontend-engineer's own already-passing
  `frontend/src/production-achievement/__tests__/App.test.ts` asserts
  `wrapper.find('[data-testid="pa-report-table"]').exists()).toBe(true)` via
  @vue/test-utils against the REAL rendered component tree (jsdom), which is
  only possible if the root's final attribute is "pa-report-table", not
  "datatable". Fixed by changing the helper's inner locator in all 4 files to
  `[data-testid="pa-report-table"]`, with a comment explaining why, so this
  doesn't get "fixed back" by a future agent unaware of the Vue mechanics.
  This fix alone is why I did not simply trust "34 pre-existing tests already
  pass" at face value -- they had never actually been exercised against a
  live app to know that.

