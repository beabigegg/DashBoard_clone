notes: >
  test-plan.md is 141 lines, over the ~100-line soft cap -- justified by
  13 broad ACs, 10 new endpoints, 3 new MySQL tables, 2 frontend apps, and
  D1/D2/D3/D6 correctness traps each needing an explicit
  not-the-other-behavior assertion. Every AC row carries a concrete bare
  target (existing file/class node ID where the file exists, a named
  not-yet-created file otherwise) so `cdd-kit test select` has a real
  collect target per criterion. implementation-plan.md and ci-gates.md
  were still template placeholders at the time this was written, so this
  test-plan.md's mapping table -- not implementation-plan.md's Test
  Execution Plan -- is the sole source cdd-kit test select can read from
  right now. Added one new hypothesis-based property test
  (tests/property/test_production_achievement_aggregate_invariant.py) for
  the PA-13/D3 aggregate-then-divide invariant, generalizing the
  single-fixture unit test across generated unequal-plan-magnitude cases.
  Visual/pixel assertions and month-mode warm-cache tests are explicitly
  out of scope (see test-plan.md's Out of Scope section).
