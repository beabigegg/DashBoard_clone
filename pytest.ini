[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

markers =
    integration: mark test as integration test (requires database)
    e2e: mark test as end-to-end test (requires running server and playwright)
    local_e2e: mark test as requiring an in-process local Flask app
    local_only: requires in-process RQ worker state; skipped against external E2E targets
    stress: mark test as stress test (may take longer, tests system stability)
    load: mark test as load test (concurrent requests, tests throughput)
